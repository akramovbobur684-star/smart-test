<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harbiy Aloqa Instituti | Test</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .header { padding: 50px 20px; }
        h1 { color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; }
        
        /* KARTALAR UCHUN KONTEYNER */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .card:hover { border-color: #38bdf8; transform: translateY(-5px); }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Harbiy Aloqa Instituti</h1>
        <p>Interaktiv Quiz Platformasi</p>
        <hr style="width: 50%; border: 0.5px solid #334155; margin: 20px auto;">
        <h3>Mavzular</h3>
    </div>

    <div id="subjects-container" class="subjects-grid">
        <p>Yuklanmoqda...</p>
    </div>

    <script src="questions.js"></script>

    <script>
        function loadDashboard() {
            const container = document.getElementById('subjects-container');
            
            // window.QUIZ_DATA borligini tekshirish
            if (typeof window.QUIZ_DATA === 'undefined') {
                container.innerHTML = "<p style='color: #ef4444;'>Xato: questions.js topilmadi!</p>";
                return;
            }

            container.innerHTML = ""; // "Yuklanmoqda"ni o'chirish

            Object.keys(window.QUIZ_DATA).forEach(id => {
                const item = window.QUIZ_DATA[id];
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="font-size: 40px;">📚</div>
                    <h2>${item.subject}</h2>
                    <p>${item.questions.length} ta savol</p>
                    <button class="btn">Boshlash</button>
                `;
                card.onclick = () => {
                    window.location.href = `quiz.html?subject=${id}`;
                };
                container.appendChild(card);
            });
        }

        // Sahifa yuklanganda ishga tushirish
        window.onload = loadDashboard;
    </script>
</body>
</html>
