<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QuizMaster Pro | Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #f1f5f9;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #0f172a 100%);
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: #1e293b;
            border-radius: 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
        }

        .logo-text h1 {
            font-size: 24px;
            color: #f1f5f9;
        }

        .logo-text p {
            font-size: 12px;
            color: #94a3b8;
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #0f172a;
            padding: 8px 20px;
            border-radius: 50px;
        }

        .profile-name {
            font-weight: 600;
            color: #38bdf8;
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .dark-toggle {
            background: #334155;
            border: none;
            color: #f1f5f9;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .dark-toggle:hover {
            background: #475569;
            transform: scale(1.05);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #38bdf8;
        }

        .stat-label {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 8px;
        }

        .subjects-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
            padding-left: 10px;
            border-left: 4px solid #3b82f6;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .subject-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .subject-card:hover {
            transform: translateY(-8px);
            border-color: #3b82f6;
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.2);
        }

        .subject-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 20px;
        }

        .subject-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .subject-count {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .subject-progress {
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
        }

        .subject-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 3px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #94a3b8;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .dashboard-container {
                padding: 15px;
            }
            
            .dashboard-header {
                padding: 15px 20px;
            }
            
            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 22px;
            }
            
            .logo-text h1 {
                font-size: 18px;
            }
            
            .subjects-title {
                font-size: 22px;
            }
            
            .subjects-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .subject-card {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .dashboard-header {
                flex-direction: column;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            
            .stat-number {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="logo-area">
                <div class="logo-icon">QM</div>
                <div class="logo-text">
                    <h1>QuizMaster Pro</h1>
                    <p>Professional test tizimi</p>
                </div>
            </div>
            <div class="profile-area">
                <span class="profile-name">Foydalanuvchi</span>
                <div class="profile-avatar">U</div>
                <button class="dark-toggle" id="darkModeToggle">🌙</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalSubjects">0</div>
                <div class="stat-label">Fanlar soni</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalQuestions">0</div>
                <div class="stat-label">Jami savollar</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedTests">0</div>
                <div class="stat-label">Bajarilgan testlar</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgScore">0%</div>
                <div class="stat-label">O'rtacha natija</div>
            </div>
        </div>

        <div class="subjects-title">📚 Fanlar ro'yxati</div>
        <div class="subjects-grid" id="subjectsGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Ma'lumotlar yuklanmoqda...</p>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        (function() {
            let subjectsData = []
            let totalQuestionsCount = 0
            
            function loadDarkMode() {
                const isDark = localStorage.getItem('darkMode') === 'true'
                if (isDark) {
                    document.body.classList.add('dark-mode')
                    const toggleBtn = document.getElementById('darkModeToggle')
                    if (toggleBtn) toggleBtn.textContent = '☀️'
                }
                return isDark
            }
            
            function saveDarkMode(isDark) {
                localStorage.setItem('darkMode', isDark)
            }
            
            function toggleDarkMode() {
                const isDark = document.body.classList.contains('dark-mode')
                if (isDark) {
                    document.body.classList.remove('dark-mode')
                    saveDarkMode(false)
                    document.getElementById('darkModeToggle').textContent = '🌙'
                } else {
                    document.body.classList.add('dark-mode')
                    saveDarkMode(true)
                    document.getElementById('darkModeToggle').textContent = '☀️'
                }
            }
            
            function extractSubjectsFromData() {
                if (!window.QUIZ_DATA) {
                    return []
                }
                
                const subjects = []
                totalQuestionsCount = 0
                
                if (Array.isArray(window.QUIZ_DATA)) {
                    const subjectObj = {
                        id: 0,
                        name: 'Barcha fanlar',
                        icon: '📖',
                        questionCount: window.QUIZ_DATA.length,
                        questions: window.QUIZ_DATA
                    }
                    subjects.push(subjectObj)
                    totalQuestionsCount = window.QUIZ_DATA.length
                } else if (window.QUIZ_DATA.subjects && Array.isArray(window.QUIZ_DATA.subjects)) {
                    window.QUIZ_DATA.subjects.forEach((subject, index) => {
                        const questionCount = subject.questions ? subject.questions.length : 0
                        subjects.push({
                            id: index,
                            name: subject.name || `Fan ${index + 1}`,
                            icon: subject.icon || '📚',
                            questionCount: questionCount,
                            questions: subject.questions || []
                        })
                        totalQuestionsCount += questionCount
                    })
                } else if (window.QUIZ_DATA.questions && Array.isArray(window.QUIZ_DATA.questions)) {
                    const subjectObj = {
                        id: 0,
                        name: 'Barcha fanlar',
                        icon: '📖',
                        questionCount: window.QUIZ_DATA.questions.length,
                        questions: window.QUIZ_DATA.questions
                    }
                    subjects.push(subjectObj)
                    totalQuestionsCount = window.QUIZ_DATA.questions.length
                } else {
                    for (let key in window.QUIZ_DATA) {
                        if (Array.isArray(window.QUIZ_DATA[key])) {
                            const subjectObj = {
                                id: parseInt(key) || subjects.length,
                                name: `Fan ${subjects.length + 1}`,
                                icon: '📚',
                                questionCount: window.QUIZ_DATA[key].length,
                                questions: window.QUIZ_DATA[key]
                            }
                            subjects.push(subjectObj)
                            totalQuestionsCount += window.QUIZ_DATA[key].length
                        }
                    }
                }
                
                return subjects
            }
            
            function updateStatistics() {
                const totalSubjectsEl = document.getElementById('totalSubjects')
                const totalQuestionsEl = document.getElementById('totalQuestions')
                
                if (totalSubjectsEl) {
                    totalSubjectsEl.textContent = subjectsData.length
                }
                
                if (totalQuestionsEl) {
                    totalQuestionsEl.textContent = totalQuestionsCount
                }
            }
            
            function getRandomProgress() {
                return Math.floor(Math.random() * 41) + 30
            }
            
            function renderSubjects() {
                const grid = document.getElementById('subjectsGrid')
                if (!grid) return
                
                if (!subjectsData || subjectsData.length === 0) {
                    grid.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Hech qanday fan topilmadi</p></div>'
                    return
                }
                
                grid.innerHTML = ''
                
                subjectsData.forEach((subject) => {
                    const card = document.createElement('div')
                    card.className = 'subject-card'
                    
                    const progressPercent = getRandomProgress()
                    
                    card.innerHTML = `
                        <div class="subject-icon">${subject.icon}</div>
                        <div class="subject-name">${subject.name}</div>
                        <div class="subject-count">${subject.questionCount} ta savol</div>
                        <div class="subject-progress">
                            <div class="subject-progress-bar" style="width: ${progressPercent}%"></div>
                        </div>
                    `
                    
                    card.addEventListener('click', () => {
                        window.location.href = `quiz.html?subject=${subject.id}`
                    })
                    
                    grid.appendChild(card)
                })
            }
            
            function loadCompletedTests() {
                const completed = localStorage.getItem('quizCompletedTests')
                return completed ? parseInt(completed) : 0
            }
            
            function loadAvgScore() {
                const avg = localStorage.getItem('quizAvgScore')
                return avg ? parseFloat(avg) : 0
            }
            
            function updateLocalStats() {
                const completedEl = document.getElementById('completedTests')
                const avgEl = document.getElementById('avgScore')
                
                if (completedEl) {
                    completedEl.textContent = loadCompletedTests()
                }
                
                if (avgEl) {
                    avgEl.textContent = Math.floor(loadAvgScore()) + '%'
                }
            }
            
            function checkDataAndRender() {
                if (window.QUIZ_DATA) {
                    subjectsData = extractSubjectsFromData()
                    updateStatistics()
                    renderSubjects()
                    updateLocalStats()
                } else {
                    setTimeout(checkDataAndRender, 100)
                }
            }
            
            function initDashboard() {
                loadDarkMode()
                
                const toggleBtn = document.getElementById('darkModeToggle')
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', toggleDarkMode)
                }
                
                checkDataAndRender()
            }
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initDashboard)
            } else {
                initDashboard()
            }
        })()
    </script>
</body>
</html>
