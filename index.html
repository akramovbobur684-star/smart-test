<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>IntelliTest - Matematika</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="home">
            <h1>Matematika Test To'plami</h1>
            <p>1996-2007 to'plami asosida</p>
            <button onclick="startTest()">Testni Boshlash</button>
        </div>

        <div id="quiz" style="display:none;">
            <div class="header">
                <span id="progress">Savol: 1/10</span>
                <span id="timer">00:00</span>
            </div>
            <div id="question-box">
                <p id="question-text"></p>
                <div id="options"></div>
            </div>
        </div>

        <div id="result" style="display:none;">
            <h2>Natija</h2>
            <p id="score-text"></p>
            <button onclick="location.reload()">Qayta boshlash</button>
        </div>
    </div>
    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
