<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizMaster Pro — Intellektual Online Test Platformasi</title>
  <meta name="description" content="AI tomonidan shaxsiylashtirilgan test tizimi. Matematika, Fizika, Dasturlash va boshqa fanlar bo'yicha bilimingizni sinang." />
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --accent: #f59e0b;
      --accent-dark: #d97706;
      --bg: #ffffff;
      --bg-secondary: #f3f4f6;
      --text: #1f2937;
      --text-secondary: #6b7280;
      --card-bg: #ffffff;
      --card-border: #e5e7eb;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.dark-mode {
      --bg: #0f172a;
      --bg-secondary: #1e293b;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --card-bg: #1e293b;
      --card-border: #334155;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
      overflow-x: hidden;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Navbar */
    .navbar {
      padding: 20px 0;
      border-bottom: 1px solid var(--card-border);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: rgba(var(--bg-rgb, 255, 255, 255), 0.9);
    }

    body.dark-mode .navbar {
      background-color: rgba(15, 23, 42, 0.9);
    }

    .navbar .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar-brand {
      font-size: 28px;
      font-weight: 800;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-weight: bold;
      font-size: 20px;
    }

    .theme-toggle {
      background: var(--bg-secondary);
      border: 1px solid var(--card-border);
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      transition: var(--transition);
      font-size: 18px;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    /* Progress Dashboard */
    .dashboard {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 24px;
      padding: 30px;
      margin: 30px 0;
      color: white;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      box-shadow: var(--shadow-xl);
    }

    .stat-card {
      text-align: center;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      transition: var(--transition);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.25);
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .stat-trend {
      font-size: 0.8rem;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .trend-up { color: #4ade80; }
    .trend-down { color: #f87171; }

    /* Search & Filter */
    .search-section {
      margin: 30px 0;
    }

    .search-bar {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .search-input-wrapper {
      flex: 1;
      position: relative;
    }

    .search-input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }

    .search-input {
      width: 100%;
      padding: 14px 16px 14px 45px;
      border: 2px solid var(--card-border);
      border-radius: 14px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 16px;
      transition: var(--transition);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .filter-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 20px;
      border: 2px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text);
      border-radius: 30px;
      cursor: pointer;
      transition: var(--transition);
      font-weight: 500;
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .filter-btn:hover:not(.active) {
      border-color: var(--primary);
    }

    /* Subjects Grid */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
      padding: 20px 0 60px;
    }

    .subject-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid var(--card-border);
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .subject-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--card-gradient, var(--primary));
    }

    .subject-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: var(--shadow-xl);
    }

    /* 3D Tilt Effect */
    .subject-card.tilt-effect {
      transition: transform 0.2s ease-out;
    }

    .card-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .subject-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .subject-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0;
      padding: 12px 0;
      border-top: 1px solid var(--card-border);
      border-bottom: 1px solid var(--card-border);
    }

    .best-score {
      text-align: center;
    }

    .score-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
    }

    .score-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .last-attempt {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .recommendation-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 12px;
    }

    .recommend-retake {
      background: #fef3c7;
      color: #d97706;
    }

    .recommend-expert {
      background: #d1fae5;
      color: #059669;
    }

    body.dark-mode .recommend-retake {
      background: #78350f;
      color: #fbbf24;
    }

    body.dark-mode .recommend-expert {
      background: #064e3b;
      color: #34d399;
    }

    .btn-start {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 16px;
    }

    .btn-start:hover {
      transform: scale(0.98);
      filter: brightness(1.05);
    }

    /* Skeleton Loading */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
      padding: 20px 0;
    }

    .skeleton-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid var(--card-border);
    }

    .skeleton-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(90deg, var(--card-border) 25%, var(--bg-secondary) 50%, var(--card-border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .skeleton-title {
      height: 28px;
      background: linear-gradient(90deg, var(--card-border) 25%, var(--bg-secondary) 50%, var(--card-border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
      margin-bottom: 12px;
      width: 70%;
    }

    .skeleton-text {
      height: 16px;
      background: linear-gradient(90deg, var(--card-border) 25%, var(--bg-secondary) 50%, var(--card-border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .skeleton-button {
      height: 48px;
      background: linear-gradient(90deg, var(--card-border) 25%, var(--bg-secondary) 50%, var(--card-border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 14px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state i {
      font-size: 64px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    /* Footer */
    .footer {
      padding: 40px 0;
      border-top: 1px solid var(--card-border);
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container { padding: 0 16px; }
      .dashboard { grid-template-columns: 1fr; gap: 15px; }
      .subjects-grid { grid-template-columns: 1fr; }
      .stat-number { font-size: 1.8rem; }
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fadeInUp {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--primary);
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      z-index: 1000;
      animation: slideInRight 0.3s ease-out;
      box-shadow: var(--shadow-lg);
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">
        <div class="brand-icon">Q</div>
        <span>QuizMaster <span style="color: var(--accent);">Pro</span></span>
      </a>
      <button id="theme-btn" class="theme-toggle" aria-label="Mavzuni almashtirish">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </nav>

  <main>
    <div class="container">
      <!-- Progress Dashboard -->
      <div class="dashboard" id="dashboard">
        <div class="stat-card">
          <div class="stat-number" id="total-tests">0</div>
          <div class="stat-label">Jami testlar</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="avg-score">0%</div>
          <div class="stat-label">O'rtacha ball</div>
          <div class="stat-trend" id="trend-indicator">
            <i class="fas fa-chart-line"></i>
            <span>Progress</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="mastered-subjects">0</div>
          <div class="stat-label">O'zlashtirilgan fanlar</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="total-questions">0</div>
          <div class="stat-label">Jami savollar</div>
        </div>
      </div>

      <!-- Search & Filter -->
      <div class="search-section">
        <div class="search-bar">
          <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" class="search-input" placeholder="Fan nomi bo'yicha qidirish..." aria-label="Fan qidirish">
          </div>
          <div class="filter-buttons" id="filter-buttons">
            <button class="filter-btn active" data-filter="all">📚 Hammasi</button>
            <button class="filter-btn" data-filter="exact">🔢 Aniq fanlar</button>
            <button class="filter-btn" data-filter="humanitarian">📖 Gumanitar fanlar</button>
            <button class="filter-btn" data-filter="retake">🔄 Qayta topshirish</button>
          </div>
        </div>
      </div>

      <!-- Subjects Grid -->
      <div id="subjects-grid" class="subjects-grid">
        <!-- Skeleton loading will appear here -->
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 QuizMaster Pro — Intellektual online test platformasi</p>
      <p style="font-size: 12px; margin-top: 8px;">AI tomonidan shaxsiylashtirilgan ta'lim</p>
    </div>
  </footer>

  <script>
    // ============================================================
    // INTELLEKTUAL QUIZMASTER PRO — FULL VERSION
    // ============================================================

    (function() {
      'use strict';

      // -------------------------------------------------------
      // 1. MA'LUMOTLAR BAZASI (Fallback bilan)
      // -------------------------------------------------------
      const DEFAULT_SUBJECTS = [
        { id: 0, name: "Matematika", icon: "fa-square-root-variable", category: "exact", gradient: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)", color: "#4f46e5", questionsCount: 20 },
        { id: 1, name: "Fizika", icon: "fa-atom", category: "exact", gradient: "linear-gradient(135deg, #f87171 0%, #dc2626 100%)", color: "#ef4444", questionsCount: 20 },
        { id: 2, name: "Ingliz tili", icon: "fa-language", category: "humanitarian", gradient: "linear-gradient(135deg, #34d399 0%, #059669 100%)", color: "#10b981", questionsCount: 20 },
        { id: 3, name: "Dasturlash", icon: "fa-code", category: "exact", gradient: "linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%)", color: "#8b5cf6", questionsCount: 20 },
        { id: 4, name: "Tarix", icon: "fa-landmark", category: "humanitarian", gradient: "linear-gradient(135deg, #fbbf24 0%, #d97706 100%)", color: "#f59e0b", questionsCount: 20 },
        { id: 5, name: "Biologiya", icon: "fa-dna", category: "exact", gradient: "linear-gradient(135deg, #6ee7b7 0%, #10b981 100%)", color: "#10b981", questionsCount: 20 },
        { id: 6, name: "Adabiyot", icon: "fa-book", category: "humanitarian", gradient: "linear-gradient(135deg, #f472b6 0%, #ec4899 100%)", color: "#ec4899", questionsCount: 20 }
      ];

      // Global ma'lumotlar
      window.QUIZ_DATA = window.QUIZ_DATA || DEFAULT_SUBJECTS.map(s => ({
        subject: s.name,
        icon: s.icon,
        color: s.color,
        questions: Array(s.questionsCount).fill(null).map((_, i) => ({
          question: `${s.name} bo'yicha ${i + 1}-savol`,
          options: ["A variant", "B variant", "C variant", "D variant"],
          answer: "A variant"
        }))
      }));

      // -------------------------------------------------------
      // 2. APP STATE
      // -------------------------------------------------------
      let allResults = [];
      let currentFilter = "all";
      let searchTerm = "";
      let isLoading = true;

      // DOM Elements
      const gridContainer = document.getElementById('subjects-grid');
      const searchInput = document.getElementById('search-input');
      const filterBtns = document.querySelectorAll('.filter-btn');
      const themeBtn = document.getElementById('theme-btn');

      // -------------------------------------------------------
      // 3. YORDAMCHI FUNKSIYALAR
      // -------------------------------------------------------
      function loadResults() {
        try {
          const stored = localStorage.getItem('quiz_results');
          allResults = stored ? JSON.parse(stored) : [];
        } catch (e) {
          console.warn("Natijalarni yuklashda xatolik:", e);
          allResults = [];
        }
        updateDashboard();
      }

      function saveResult(result) {
        allResults.unshift({ ...result, timestamp: Date.now() });
        while (allResults.length > 50) allResults.pop();
        localStorage.setItem('quiz_results', JSON.stringify(allResults));
        updateDashboard();
      }

      function getSubjectStats(subjectId) {
        const subjectResults = allResults.filter(r => r.subjectIndex === subjectId);
        if (subjectResults.length === 0) return null;
        
        const bestScore = Math.max(...subjectResults.map(r => r.percent));
        const lastAttempt = subjectResults[0]?.timestamp;
        const attemptsCount = subjectResults.length;
        
        return { bestScore, lastAttempt, attemptsCount };
      }

      function getRecommendation(bestScore) {
        if (bestScore === null) return { text: "🆕 Yangi fan", type: "new" };
        if (bestScore < 60) return { text: "⚠️ Qayta topshirish tavsiya etiladi", type: "retake" };
        if (bestScore >= 85) return { text: "🏆 Siz ushbu fanning ustasisiz!", type: "expert" };
        if (bestScore >= 70) return { text: "👍 Yaxshi natija, yanada yaxshilashingiz mumkin", type: "good" };
        return { text: "📚 Bir marta ko'rib chiqing", type: "normal" };
      }

      function formatDate(timestamp) {
        if (!timestamp) return "Hali topshirilmagan";
        const date = new Date(timestamp);
        return `${date.getDate()}.${date.getMonth() + 1}.${date.getFullYear()}`;
      }

      function updateDashboard() {
        const totalTests = allResults.length;
        const avgScore = totalTests > 0 
          ? Math.round(allResults.reduce((sum, r) => sum + r.percent, 0) / totalTests)
          : 0;
        
        // O'zlashtirilgan fanlar (85% dan yuqori)
        const masteredSubjects = new Set();
        allResults.forEach(r => {
          if (r.percent >= 85) masteredSubjects.add(r.subjectIndex);
        });
        
        const totalQuestions = window.QUIZ_DATA.reduce((sum, s) => sum + (s.questions?.length || 20), 0);
        
        document.getElementById('total-tests').textContent = totalTests;
        document.getElementById('avg-score').textContent = `${avgScore}%`;
        document.getElementById('mastered-subjects').textContent = masteredSubjects.size;
        document.getElementById('total-questions').textContent = totalQuestions;
        
        // Trend indicator
        const trendEl = document.getElementById('trend-indicator');
        if (allResults.length >= 2) {
          const lastTwo = allResults.slice(0, 2);
          const trend = lastTwo[0].percent - lastTwo[1].percent;
          if (trend > 0) {
            trendEl.innerHTML = '<i class="fas fa-arrow-up trend-up"></i><span>O\'sish +' + trend + '%</span>';
          } else if (trend < 0) {
            trendEl.innerHTML = '<i class="fas fa-arrow-down trend-down"></i><span>Pasayish ' + trend + '%</span>';
          } else {
            trendEl.innerHTML = '<i class="fas fa-chart-line"></i><span>Barqaror</span>';
          }
        } else {
          trendEl.innerHTML = '<i class="fas fa-chart-line"></i><span>Yetarli ma\'lumot yo\'q</span>';
        }
      }

      // -------------------------------------------------------
      // 4. 3D TILT EFFECT
      // -------------------------------------------------------
      function addTiltEffect(card) {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = (y - centerY) / 20;
          const rotateY = (centerX - x) / 20;
          card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-8px) scale(1.02)`;
        });
        
        card.addEventListener('mouseleave', () => {
          card.style.transform = '';
        });
      }

      // -------------------------------------------------------
      // 5. KARTOCHKALARNI RENDER QILISH (Intersection Observer bilan)
      // -------------------------------------------------------
      function renderSubjects() {
        if (!gridContainer) return;
        
        // Filter va Search
        let filteredSubjects = window.QUIZ_DATA.map((subject, idx) => ({ ...subject, originalIndex: idx }));
        
        // Category filter
        if (currentFilter === "exact") {
          filteredSubjects = filteredSubjects.filter(s => 
            ["Matematika", "Fizika", "Dasturlash", "Biologiya"].includes(s.subject)
          );
        } else if (currentFilter === "humanitarian") {
          filteredSubjects = filteredSubjects.filter(s => 
            ["Ingliz tili", "Tarix", "Adabiyot"].includes(s.subject)
          );
        } else if (currentFilter === "retake") {
          filteredSubjects = filteredSubjects.filter(s => {
            const stats = getSubjectStats(s.originalIndex);
            return stats && stats.bestScore < 60;
          });
        }
        
        // Search filter
        if (searchTerm) {
          filteredSubjects = filteredSubjects.filter(s => 
            s.subject.toLowerCase().includes(searchTerm.toLowerCase())
          );
        }
        
        if (filteredSubjects.length === 0) {
          gridContainer.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-search"></i>
              <h3>Hech qanday fan topilmadi</h3>
              <p>Qidiruv so'zini o'zgartiring yoki filtrni bekor qiling</p>
            </div>
          `;
          return;
        }
        
        gridContainer.innerHTML = '';
        
        filteredSubjects.forEach((subject, idx) => {
          const stats = getSubjectStats(subject.originalIndex);
          const bestScore = stats?.bestScore || null;
          const lastAttempt = stats?.lastAttempt || null;
          const recommendation = getRecommendation(bestScore);
          
          const card = document.createElement('div');
          card.className = 'subject-card animate-fadeInUp';
          card.style.setProperty('--card-gradient', subject.gradient || `linear-gradient(135deg, ${subject.color}, ${subject.color}dd)`);
          card.style.animationDelay = `${idx * 0.05}s`;
          
          let recommendationHtml = '';
          if (recommendation.type === 'retake') {
            recommendationHtml = `<div class="recommendation-badge recommend-retake">${recommendation.text}</div>`;
          } else if (recommendation.type === 'expert') {
            recommendationHtml = `<div class="recommendation-badge recommend-expert">${recommendation.text}</div>`;
          } else if (recommendation.type === 'new') {
            recommendationHtml = `<div class="recommendation-badge" style="background: var(--bg-secondary);">${recommendation.text}</div>`;
          }
          
          card.innerHTML = `
            <div class="card-icon">
              <i class="fas ${subject.icon || 'fa-graduation-cap'}" style="color: ${subject.color}"></i>
            </div>
            <h3 class="subject-name">${subject.subject}</h3>
            <div class="subject-stats">
              <div class="best-score">
                <div class="score-value">${bestScore ? bestScore + '%' : '—'}</div>
                <div class="score-label">Eng yaxshi natija</div>
              </div>
              <div class="last-attempt">
                <i class="fas fa-calendar-alt"></i> ${formatDate(lastAttempt)}
              </div>
            </div>
            ${recommendationHtml}
            <button class="btn-start" data-subject-idx="${subject.originalIndex}">
              <i class="fas fa-play"></i> Testni boshlash
            </button>
          `;
          
          // Add click event to button
          const startBtn = card.querySelector('.btn-start');
          startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const idx = parseInt(startBtn.dataset.subjectIdx);
            window.location.href = `quiz.html?subject=${idx}`;
          });
          
          // Optional: click on card also starts test
          card.addEventListener('click', (e) => {
            if (e.target !== startBtn && !startBtn.contains(e.target)) {
              startBtn.click();
            }
          });
          
          gridContainer.appendChild(card);
          addTiltEffect(card);
        });
        
        // Intersection Observer for smooth appearance
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.style.opacity = '1';
              entry.target.style.transform = 'translateY(0)';
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });
        
        document.querySelectorAll('.subject-card').forEach(card => {
          card.style.opacity = '0';
          card.style.transform = 'translateY(30px)';
          card.style.transition = 'all 0.6s ease-out';
          observer.observe(card);
        });
      }

      // -------------------------------------------------------
      // 6. SKELETON LOADING
      // -------------------------------------------------------
      function showSkeletonLoading() {
        if (!gridContainer) return;
        gridContainer.innerHTML = `
          <div class="skeleton-grid">
            ${Array(6).fill(0).map(() => `
              <div class="skeleton-card">
                <div class="skeleton-icon"></div>
                <div class="skeleton-title"></div>
                <div class="skeleton-text"></div>
                <div class="skeleton-text" style="width: 60%"></div>
                <div class="skeleton-button"></div>
              </div>
            `).join('')}
          </div>
        `;
      }

      // -------------------------------------------------------
      // 7. INITIALIZATION
      // -------------------------------------------------------
      async function init() {
        showSkeletonLoading();
        
        // Wait for data or timeout
        let attempts = 0;
        while ((!window.QUIZ_DATA || window.QUIZ_DATA.length === 0) && attempts < 30) {
          await new Promise(resolve => setTimeout(resolve, 100));
          attempts++;
        }
        
        loadResults();
        isLoading = false;
        renderSubjects();
        
        // Setup event listeners
        if (searchInput) {
          searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderSubjects();
          });
        }
        
        filterBtns.forEach(btn => {
          btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderSubjects();
          });
        });
        
        // Theme toggle
        const prefersDark = localStorage.getItem('theme') === 'dark' || 
          (window.matchMedia('(prefers-color-scheme: dark)').matches && !localStorage.getItem('theme'));
        
        if (prefersDark) {
          document.body.classList.add('dark-mode');
          const themeIcon = themeBtn?.querySelector('i');
          if (themeIcon) themeIcon.className = 'fas fa-sun';
        }
        
        if (themeBtn) {
          themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const themeIcon = themeBtn.querySelector('i');
            if (themeIcon) {
              themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            }
          });
        }
      }
      
      // Export for global access
      window.QuizApp = window.QuizApp || {};
      window.QuizApp.saveResult = saveResult;
      window.QuizApp.loadResults = loadResults;
      
      // Start the app
      init();
    })();
  </script>
</body>
</html>
