<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harbiy Aloqa Instituti | Test Platformasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f1f5f9;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            padding: 20px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }
        .card h2 {
            margin: 0 0 15px 0;
            font-size: 1.5rem;
        }
        .card p {
            color: #94a3b8;
            font-size: 1rem;
        }
        .btn-start {
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Harbiy Aloqa Instituti</h1>
        <p>IntelliTest v2.0 | Kelajak ofitserlari uchun bilim sinovi</p>
    </header>

    <div class="container" id="subjects-container">
        </div>

    <script src="questions.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('subjects-container');
            
            // window.QUIZ_DATA dagi fanlarni o'qish
            Object.keys(window.QUIZ_DATA).forEach(id => {
                const subject = window.QUIZ_DATA[id];
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h2>${subject.subject}</h2>
                    <p>${subject.questions.length} ta savol mavjud</p>
                    <button class="btn-start">Testni boshlash</button>
                `;
                card.onclick = () => {
                    window.location.href = `quiz.html?subject=${id}`;
                };
                container.appendChild(card);
            });
        });
    </script>
</body>
</html>
