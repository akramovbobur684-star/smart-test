<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster Pro — Intellektual Online Test Platformasi</title>
    <meta name="description" content="AI tomonidan shaxsiylashtirilgan test tizimi">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Asosiy CSS (root papkada) -->
    <link rel="stylesheet" href="style.css?v=1.2">
    
    <style>
        /* Qo'shimcha stillar (agar kerak bo'lsa) */
        :root {
            --primary: #4f46e5;
            --accent: #f59e0b;
            --bg: #ffffff;
            --bg-secondary: #f3f4f6;
            --text: #1f2937;
        }
        
        body.dark-mode {
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --text: #f1f5f9;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s;
            margin: 0;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding: 40px 0; }
        .subject-card { background: var(--bg-secondary); border-radius: 20px; padding: 25px; cursor: pointer; transition: transform 0.3s; }
        .subject-card:hover { transform: translateY(-5px); }
        .btn-start { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; width: 100%; }
        .theme-toggle { background: var(--bg-secondary); border: 1px solid #ccc; padding: 8px 15px; border-radius: 30px; cursor: pointer; }
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 30px 0; }
        .stat-card { background: var(--bg-secondary); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: bold; color: var(--primary); }
        
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: repeat(2, 1fr); }
            .subjects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar" style="padding: 20px 0; border-bottom: 1px solid #e5e7eb;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" style="font-size: 24px; font-weight: bold; text-decoration: none; color: var(--text);">
                📝 QuizMaster <span style="color: var(--accent);">Pro</span>
            </a>
            <button id="theme-btn" class="theme-toggle">🌙 Dark</button>
        </div>
    </nav>

    <main>
        <div class="container">
            <!-- Dashboard -->
            <div class="dashboard">
                <div class="stat-card">
                    <div class="stat-number" id="total-tests">0</div>
                    <div>Jami testlar</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="avg-score">0%</div>
                    <div>O'rtacha ball</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="mastered">0</div>
                    <div>O'zlashtirilgan fanlar</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-questions">0</div>
                    <div>Jami savollar</div>
                </div>
            </div>

            <!-- Search -->
            <div style="margin: 30px 0;">
                <input type="text" id="search-input" placeholder="🔍 Fan nomi bo'yicha qidirish..." style="width: 100%; padding: 15px; border-radius: 30px; border: 1px solid #ccc; background: var(--bg-secondary); color: var(--text);">
            </div>

            <!-- Filter -->
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px;">
                <button class="filter-btn active" data-filter="all">📚 Hammasi</button>
                <button class="filter-btn" data-filter="exact">🔢 Aniq fanlar</button>
                <button class="filter-btn" data-filter="humanitarian">📖 Gumanitar fanlar</button>
                <button class="filter-btn" data-filter="retake">🔄 Qayta topshirish</button>
            </div>

            <!-- Subjects Grid -->
            <div id="subjects-grid" class="subjects-grid"></div>
        </div>
    </main>

    <footer style="text-align: center; padding: 40px 0; border-top: 1px solid #e5e7eb; margin-top: 40px;">
        <p>&copy; 2026 QuizMaster Pro — Intellektual online test platformasi</p>
    </footer>

    <!-- ============================================================ -->
    <!-- ROOT PAPKASIDAGI FAYLLAR (papkalarsiz)                       -->
    <!-- ============================================================ -->
    
    <!-- 1️⃣ Ma'lumotlar bazasi (questions.js) -->
    <script src="questions.js?v=1.2"></script>
    
    <!-- 2️⃣ App (umumiy funksiyalar) -->
    <script src="app.js?v=1.2"></script>
    
    <!-- 3️⃣ Index sahifasi uchun JS -->
    <script src="index.js?v=1.2"></script>
</body>
</html>
