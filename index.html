<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizMaster Pro — Intellektual Online Test Platformasi</title>
  <meta name="description" content="AI tomonidan shaxsiylashtirilgan test tizimi. Bilimingizni sinang va natijalaringizni tahlil qiling." />
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --primary-light: #818cf8;
      --accent: #f59e0b;
      --accent-dark: #d97706;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
      
      --bg: #ffffff;
      --bg-secondary: #f9fafb;
      --bg-tertiary: #f3f4f6;
      --text: #111827;
      --text-secondary: #6b7280;
      --text-tertiary: #9ca3af;
      --card-bg: #ffffff;
      --card-border: #e5e7eb;
      --border-light: #f3f4f6;
      
      --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.dark-mode {
      --bg: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --card-bg: #1e293b;
      --card-border: #334155;
      --border-light: #334155;
      
      --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
      --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color var(--transition-base), color var(--transition-base);
      line-height: 1.5;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ========== NAVBAR ========== */
    .navbar {
      padding: 16px 0;
      border-bottom: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: rgba(var(--bg-rgb, 255, 255, 255), 0.85);
    }

    body.dark-mode .navbar {
      background-color: rgba(15, 23, 42, 0.85);
    }

    .navbar .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar-brand {
      font-size: 28px;
      font-weight: 800;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
    }

    .brand-icon {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      font-weight: bold;
      font-size: 20px;
      color: white;
    }

    .theme-toggle {
      background: var(--bg-secondary);
      border: 1px solid var(--card-border);
      padding: 12px;
      border-radius: 50%;
      cursor: pointer;
      transition: var(--transition-fast);
      font-size: 18px;
      color: var(--text);
    }

    .theme-toggle:hover {
      transform: scale(1.05);
      background: var(--bg-tertiary);
    }

    /* ========== DASHBOARD STATS ========== */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin: 32px 0;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--card-bg), var(--bg-secondary));
      border-radius: 24px;
      padding: 24px;
      border: 1px solid var(--card-border);
      transition: var(--transition-base);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .stat-icon {
      font-size: 32px;
      margin-bottom: 16px;
    }

    .stat-number {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .stat-trend {
      margin-top: 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .trend-up { color: var(--success); }
    .trend-down { color: var(--danger); }

    /* ========== SEARCH & FILTER ========== */
    .search-section {
      margin: 32px 0 24px;
    }

    .search-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .search-input-wrapper {
      flex: 1;
      position: relative;
      min-width: 200px;
    }

    .search-input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 18px;
    }

    .search-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 2px solid var(--card-border);
      border-radius: 16px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 15px;
      transition: var(--transition-fast);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .filter-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 24px;
      border: 2px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text);
      border-radius: 40px;
      cursor: pointer;
      transition: var(--transition-fast);
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-btn i {
      font-size: 14px;
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .filter-btn:hover:not(.active) {
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    /* ========== SUBJECTS GRID ========== */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      padding: 20px 0 60px;
    }

    .subject-card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 28px;
      cursor: pointer;
      transition: var(--transition-base);
      border: 1px solid var(--card-border);
      position: relative;
      overflow: hidden;
    }

    .subject-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: var(--card-gradient, linear-gradient(90deg, var(--primary), var(--accent)));
    }

    .subject-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-xl);
    }

    /* Fade animation for filtering */
    .subject-card.fade-out {
      animation: fadeOut 0.2s ease-out forwards;
    }

    .subject-card.fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.95); display: none; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .subject-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subject-category {
      display: inline-block;
      padding: 4px 12px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .subject-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0;
      padding: 16px 0;
      border-top: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
    }

    .best-score {
      text-align: center;
      flex: 1;
    }

    .score-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
    }

    .score-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .attempt-count {
      text-align: center;
      flex: 1;
      border-left: 1px solid var(--border-light);
    }

    .attempt-number {
      font-size: 24px;
      font-weight: 700;
    }

    .attempt-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .last-attempt {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 12px;
      text-align: center;
    }

    .smart-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      margin: 12px 0;
      width: 100%;
      justify-content: center;
    }

    .badge-retake {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #92400e;
    }

    .badge-expert {
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      color: #065f46;
    }

    .badge-good {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      color: #1e40af;
    }

    .badge-new {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    body.dark-mode .badge-retake {
      background: linear-gradient(135deg, #78350f, #92400e);
      color: #fde68a;
    }

    body.dark-mode .badge-expert {
      background: linear-gradient(135deg, #064e3b, #065f46);
      color: #a7f3d0;
    }

    body.dark-mode .badge-good {
      background: linear-gradient(135deg, #1e3a8a, #1e40af);
      color: #bfdbfe;
    }

    .btn-start {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: var(--transition-fast);
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-start:hover {
      transform: scale(0.98);
      filter: brightness(1.05);
    }

    /* ========== SKELETON LOADING ========== */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      padding: 20px 0;
    }

    .skeleton-card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 28px;
      border: 1px solid var(--card-border);
    }

    .skeleton-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(90deg, var(--card-border) 25%, var(--bg-secondary) 50%, var(--card-border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    .skeleton-title {
      height: 28px;
      background: linear-gradient(90deg, var(--card-border) 25%, var(--bg-secondary) 50%, var(--card-border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
      margin-bottom: 12px;
      width: 70%;
    }

    .skeleton-text {
      height: 14px;
      background: linear-gradient(90deg, var(--card-border) 25%, var(--bg-secondary) 50%, var(--card-border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .skeleton-button {
      height: 52px;
      background: linear-gradient(90deg, var(--card-border) 25%, var(--bg-secondary) 50%, var(--card-border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 16px;
      margin-top: 20px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ========== EMPTY STATE ========== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      background: var(--card-bg);
      border-radius: 28px;
      border: 1px solid var(--card-border);
    }

    .empty-state i {
      font-size: 64px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    /* ========== FOOTER ========== */
    .footer {
      padding: 40px 0;
      border-top: 1px solid var(--card-border);
      text-align: center;
    }

    /* ========== TOAST NOTIFICATION ========== */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--primary);
      color: white;
      padding: 14px 24px;
      border-radius: 16px;
      z-index: 1000;
      animation: slideInRight 0.3s ease-out;
      box-shadow: var(--shadow-lg);
      font-weight: 500;
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 1024px) {
      .dashboard { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .container { padding: 0 16px; }
      .dashboard { grid-template-columns: 1fr; gap: 16px; }
      .subjects-grid { grid-template-columns: 1fr; }
      .stat-number { font-size: 28px; }
      .search-bar { flex-direction: column; }
      .filter-buttons { justify-content: center; }
    }

    @media (max-width: 480px) {
      .subject-stats { flex-direction: column; gap: 12px; }
      .attempt-count { border-left: none; border-top: 1px solid var(--border-light); padding-top: 12px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">
        <div class="brand-icon">Q</div>
        <span>QuizMaster <span style="color: var(--accent);">Pro</span></span>
      </a>
      <button id="theme-btn" class="theme-toggle" aria-label="Mavzuni almashtirish">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </nav>

  <main>
    <div class="container">
      <!-- ========== DASHBOARD STATISTICS ========== -->
      <div class="dashboard" id="dashboard">
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-chalkboard-user"></i></div>
          <div class="stat-number" id="stat-total-tests">0</div>
          <div class="stat-label">Jami testlar</div>
          <div class="stat-trend" id="trend-tests">
            <i class="fas fa-chart-line"></i>
            <span>Yakunlangan</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-chart-simple"></i></div>
          <div class="stat-number" id="stat-avg-score">0%</div>
          <div class="stat-label">O'rtacha ball</div>
          <div class="stat-trend" id="trend-score">
            <i class="fas fa-minus-circle"></i>
            <span>Kutilmoqda</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-trophy"></i></div>
          <div class="stat-number" id="stat-mastered">0</div>
          <div class="stat-label">O'zlashtirilgan fanlar</div>
          <div class="stat-trend">
            <i class="fas fa-star"></i>
            <span>85%+ ball</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-database"></i></div>
          <div class="stat-number" id="stat-total-questions">0</div>
          <div class="stat-label">Jami savollar</div>
          <div class="stat-trend">
            <i class="fas fa-brain"></i>
            <span>Baza</span>
          </div>
        </div>
      </div>

      <!-- ========== SEARCH & FILTER ========== -->
      <div class="search-section">
        <div class="search-bar">
          <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" class="search-input" placeholder="Fan nomi bo'yicha qidirish..." autocomplete="off">
          </div>
          <div class="filter-buttons" id="filter-buttons">
            <button class="filter-btn active" data-filter="all">
              <i class="fas fa-layer-group"></i> Hammasi
            </button>
            <button class="filter-btn" data-filter="exact">
              <i class="fas fa-square-root-variable"></i> Aniq fanlar
            </button>
            <button class="filter-btn" data-filter="humanitarian">
              <i class="fas fa-landmark"></i> Gumanitar fanlar
            </button>
            <button class="filter-btn" data-filter="retake">
              <i class="fas fa-rotate-right"></i> Qayta topshirish
            </button>
          </div>
        </div>
      </div>

      <!-- ========== SUBJECTS GRID ========== -->
      <div id="subjects-grid" class="subjects-grid"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 QuizMaster Pro — Intellektual online test platformasi</p>
      <p style="font-size: 12px; margin-top: 8px; color: var(--text-secondary);">
        <i class="fas fa-microchip"></i> AI tomonidan shaxsiylashtirilgan ta'lim
      </p>
    </div>
  </footer>

  <script>
    // ============================================================
    // QUIZMASTER PRO — INTELLEKTUAL INDEX SAHIFASI v3.0
    // Dinamik statistika, filtrlash, smart badges, dark mode xotirasi
    // ============================================================

    (function() {
      'use strict';

      // -------------------------------------------------------
      // 1. KONFIGURATSIYA VA MA'LUMOTLAR
      // -------------------------------------------------------
      
      // Fanlar ma'lumotlar bazasi (questions.js dan keladi yoki fallback)
      const SUBJECTS_DB = [
        { id: 0, name: "Matematika", icon: "fa-square-root-variable", category: "exact", gradient: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)", color: "#4f46e5", questionsCount: 20 },
        { id: 1, name: "Fizika", icon: "fa-atom", category: "exact", gradient: "linear-gradient(135deg, #f87171 0%, #dc2626 100%)", color: "#ef4444", questionsCount: 20 },
        { id: 2, name: "Ingliz tili", icon: "fa-language", category: "humanitarian", gradient: "linear-gradient(135deg, #34d399 0%, #059669 100%)", color: "#10b981", questionsCount: 20 },
        { id: 3, name: "Dasturlash", icon: "fa-code", category: "exact", gradient: "linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%)", color: "#8b5cf6", questionsCount: 20 },
        { id: 4, name: "Tarix", icon: "fa-landmark", category: "humanitarian", gradient: "linear-gradient(135deg, #fbbf24 0%, #d97706 100%)", color: "#f59e0b", questionsCount: 20 },
        { id: 5, name: "Biologiya", icon: "fa-dna", category: "exact", gradient: "linear-gradient(135deg, #6ee7b7 0%, #10b981 100%)", color: "#10b981", questionsCount: 20 },
        { id: 6, name: "Adabiyot", icon: "fa-book", category: "humanitarian", gradient: "linear-gradient(135deg, #f472b6 0%, #ec4899 100%)", color: "#ec4899", questionsCount: 20 }
      ];

      // Global QUIZ_DATA ni tekshirish
      if (!window.QUIZ_DATA) {
        window.QUIZ_DATA = SUBJECTS_DB.map(s => ({
          subject: s.name,
          icon: s.icon,
          color: s.color,
          questions: Array(s.questionsCount).fill(null).map((_, i) => ({
            question: `${s.name} bo'yicha ${i + 1}-savol`,
            options: ["Variant A", "Variant B", "Variant C", "Variant D"],
            answer: "Variant A"
          }))
        }));
      }

      // -------------------------------------------------------
      // 2. APP STATE
      // -------------------------------------------------------
      let allResults = [];           // Barcha test natijalari
      let currentFilter = "all";    // Aktiv filtr
      let searchTerm = "";           // Qidiruv so'zi
      let isLoading = true;          // Yuklanish holati
      let animationTimeout = null;   // Animatsiya uchun timeout

      // DOM elementlari
      const gridContainer = document.getElementById('subjects-grid');
      const searchInput = document.getElementById('search-input');
      const filterBtns = document.querySelectorAll('.filter-btn');
      const themeBtn = document.getElementById('theme-btn');

      // -------------------------------------------------------
      // 3. LOCALSTORAGE BILAN ISHLASH (qm_results)
      // -------------------------------------------------------
      
      /**
       * Natijalarni localStorage'dan yuklash
       * Kalit nomi: qm_results (QuizMaster results)
       */
      function loadResults() {
        try {
          const stored = localStorage.getItem('qm_results');
          if (stored) {
            allResults = JSON.parse(stored);
            console.log(`📊 ${allResults.length} ta test natijasi yuklandi`);
          } else {
            allResults = [];
            console.log('📊 Hech qanday natija topilmadi');
          }
        } catch (e) {
          console.error('Natijalarni yuklashda xatolik:', e);
          allResults = [];
        }
        updateDashboard();
      }

      /**
       * Natijalarni localStorage'ga saqlash
       */
      function saveResults() {
        try {
          localStorage.setItem('qm_results', JSON.stringify(allResults));
        } catch (e) {
          console.error('Natijalarni saqlashda xatolik:', e);
        }
      }

      /**
       * Yangi natija qo'shish (test yakunlanganda chaqiriladi)
       */
      function addResult(result) {
        allResults.unshift({ 
          ...result, 
          timestamp: Date.now(),
          id: Date.now() + Math.random()
        });
        // Oxirgi 100 ta natijani saqlash
        while (allResults.length > 100) allResults.pop();
        saveResults();
        updateDashboard();
        renderSubjects(); // Kartochkalarni yangilash
      }

      // Global foydalanish uchun export
      window.QuizApp = window.QuizApp || {};
      window.QuizApp.addResult = addResult;
      window.QuizApp.loadResults = loadResults;

      // -------------------------------------------------------
      // 4. DASHBOARD STATISTIKASI (4 TA BLOK)
      // -------------------------------------------------------
      
      function updateDashboard() {
        // 1. Jami testlar soni
        const totalTests = allResults.length;
        
        // 2. O'rtacha ball
        const avgScore = totalTests > 0 
          ? Math.round(allResults.reduce((sum, r) => sum + (r.percent || 0), 0) / totalTests)
          : 0;
        
        // 3. O'zlashtirilgan fanlar (85% dan yuqori ball olgan fanlar)
        const masteredSubjects = new Set();
        allResults.forEach(r => {
          if ((r.percent || 0) >= 85) {
            masteredSubjects.add(r.subjectIndex);
          }
        });
        
        // 4. Jami savollar soni
        const totalQuestions = window.QUIZ_DATA.reduce((sum, s) => sum + (s.questions?.length || 20), 0);
        
        // DOM elementlarini yangilash
        const totalTestsEl = document.getElementById('stat-total-tests');
        const avgScoreEl = document.getElementById('stat-avg-score');
        const masteredEl = document.getElementById('stat-mastered');
        const totalQuestionsEl = document.getElementById('stat-total-questions');
        
        if (totalTestsEl) totalTestsEl.textContent = totalTests;
        if (avgScoreEl) avgScoreEl.textContent = `${avgScore}%`;
        if (masteredEl) masteredEl.textContent = masteredSubjects.size;
        if (totalQuestionsEl) totalQuestionsEl.textContent = totalQuestions;
        
        // Trend ma'lumotlari (oxirgi 2 test orasidagi farq)
        const trendTestsEl = document.getElementById('trend-tests');
        const trendScoreEl = document.getElementById('trend-score');
        
        if (allResults.length >= 2 && trendScoreEl) {
          const lastTwo = allResults.slice(0, 2);
          const scoreDiff = lastTwo[0].percent - lastTwo[1].percent;
          if (scoreDiff > 0) {
            trendScoreEl.innerHTML = `<i class="fas fa-arrow-up trend-up"></i><span>+${scoreDiff}% o'sdi</span>`;
          } else if (scoreDiff < 0) {
            trendScoreEl.innerHTML = `<i class="fas fa-arrow-down trend-down"></i><span>${scoreDiff}% pasaydi</span>`;
          } else {
            trendScoreEl.innerHTML = `<i class="fas fa-chart-line"></i><span>Barqaror</span>`;
          }
        } else if (trendScoreEl) {
          trendScoreEl.innerHTML = `<i class="fas fa-chart-line"></i><span>Yetarli ma'lumot yo'q</span>`;
        }
        
        if (trendTestsEl) {
          trendTestsEl.innerHTML = `<i class="fas fa-check-circle"></i><span>${totalTests} ta yakunlangan</span>`;
        }
      }

      // -------------------------------------------------------
      // 5. FAN STATISTIKASI (SMART BADGES UCHUN)
      // -------------------------------------------------------
      
      /**
       * Fan bo'yicha statistik ma'lumotlarni olish
       */
      function getSubjectStats(subjectId) {
        const subjectResults = allResults.filter(r => r.subjectIndex === subjectId);
        if (subjectResults.length === 0) return null;
        
        const bestScore = Math.max(...subjectResults.map(r => r.percent || 0));
        const lastAttempt = subjectResults[0]?.timestamp;
        const attemptsCount = subjectResults.length;
        const lastScore = subjectResults[0]?.percent || 0;
        
        return { bestScore, lastAttempt, attemptsCount, lastScore };
      }

      /**
       * Aqlli badge (tavsiya) generatsiyasi
       * - 85%+ => "Siz ushbu fanning ustasisiz!"
       * - 60-84% => "Yaxshi natija, yanada yaxshilashingiz mumkin"
       * - <60% => "Qayta topshirish tavsiya etiladi"
       * - null => "Hali topshirilmagan"
       */
      function getSmartBadge(bestScore) {
        if (bestScore === null) {
          return { text: "🆕 Hali topshirilmagan", type: "new", icon: "fa-hourglass-half" };
        }
        if (bestScore >= 85) {
          return { text: "🏆 Siz ushbu fanning ustasisiz!", type: "expert", icon: "fa-crown" };
        }
        if (bestScore >= 60) {
          return { text: "👍 Yaxshi natija, yanada yaxshilashingiz mumkin", type: "good", icon: "fa-thumbs-up" };
        }
        return { text: "⚠️ Qayta topshirish tavsiya etiladi", type: "retake", icon: "fa-rotate-right" };
      }
