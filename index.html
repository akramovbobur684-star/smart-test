<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>QuizArena | Interaktiv Test Platformasi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        :root {
            --bg-light: #f8fafc;
            --surface-light: #ffffff;
            --text-light: #0f172a;
            --text-secondary-light: #475569;
            --border-light: #e2e8f0;

            --bg-dark: #0f172a;
            --surface-dark: #1e293b;
            --text-dark: #f1f5f9;
            --text-secondary-dark: #cbd5e1;
            --border-dark: #334155;

            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            min-height: 100vh;
        }

        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Navbar */
        .navbar {
            background: var(--surface-light);
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        body.dark .navbar {
            background: var(--surface-dark);
            border-bottom-color: var(--border-dark);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Dark Mode Toggle */
        .theme-toggle {
            background: var(--border-light);
            border: none;
            border-radius: 50px;
            width: 50px;
            height: 26px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }

        body.dark .theme-toggle {
            background: var(--border-dark);
        }

        .theme-toggle::after {
            content: '🌙';
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 14px;
            transition: 0.3s;
        }

        body.dark .theme-toggle::after {
            content: '☀️';
            left: 26px;
        }

        /* Dashboard */
        .dashboard {
            margin-top: 40px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface-light);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        body.dark .stat-card {
            background: var(--surface-dark);
            border-color: var(--border-dark);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .subject-card {
            background: var(--surface-light);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        body.dark .subject-card {
            background: var(--surface-dark);
        }

        .subject-card:hover {
            transform: translateY(-4px);
        }

        .subject-card.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(139,92,246,0.1));
        }

        .subject-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .subject-info {
            color: var(--text-secondary-light);
            font-size: 0.9rem;
        }

        body.dark .subject-info {
            color: var(--text-secondary-dark);
        }

        /* Settings Panel */
        .settings-panel {
            background: var(--surface-light);
            border-radius: 16px;
            padding: 24px;
            margin-top: 30px;
            border: 1px solid var(--border-light);
        }

        body.dark .settings-panel {
            background: var(--surface-dark);
            border-color: var(--border-dark);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
            background: var(--bg-light);
            color: var(--text-light);
            font-size: 1rem;
        }

        body.dark select,
        body.dark input {
            background: var(--bg-dark);
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        .btn-start {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-start:hover {
            background: var(--primary-hover);
        }

        .error-message {
            background: var(--danger);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
            
            .subjects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">🎯 QuizArena</div>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard">
            <div class="error-message" id="errorMessage"></div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalQuestions">0</div>
                    <div>Jami Savollar</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalSubjects">0</div>
                    <div>Fanlar</div>
                </div>
            </div>

            <h2>📚 Fanlardan birini tanlang</h2>
            <div class="subjects-grid" id="subjectsGrid"></div>

            <div class="settings-panel">
                <h3>⚙️ Test sozlamalari</h3>
                <div class="form-group">
                    <label>📝 Savollar soni</label>
                    <input type="number" id="questionCount" min="1" max="100" value="20">
                </div>
                <div class="form-group">
                    <label>⏱️ Vaqt (daqiqa)</label>
                    <input type="number" id="timeLimit" min="1" max="180" value="30">
                </div>
                <button class="btn-start" id="startQuiz">🚀 Testni boshlash</button>
            </div>
        </div>
    </div>

    <script src="questions.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>
