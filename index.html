<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IntelliTest | Harbiy aloqa instituti</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03060c);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #eef2ff, #a5b4fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .header p {
            color: #9ca3af;
            margin-top: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            border-bottom: 1px dashed #2d3748;
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        .status-badge {
            background: #1e293b;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            border-radius: 60px;
            margin-top: 1rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .retry-log {
            font-family: monospace;
            font-size: 0.7rem;
            color: #94a3b8;
            background: #0f172a;
            padding: 0.2rem 0.9rem;
            border-radius: 20px;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
            margin: 2.5rem 0;
        }

        .subject-card {
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 2rem;
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.25s ease;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            cursor: pointer;
        }

        .subject-card:hover {
            transform: translateY(-6px);
            border-color: #3b82f6;
            box-shadow: 0 25px 35px -14px #0f172a;
            background: rgba(30, 41, 59, 0.85);
        }

        .card-header {
            padding: 1.5rem 1.5rem 0.8rem 1.5rem;
            background: linear-gradient(120deg, rgba(37, 99, 235, 0.2), rgba(0,0,0,0.1));
        }

        .subject-name {
            font-size: 1.7rem;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: -0.3px;
        }

        .subject-id {
            font-size: 0.7rem;
            color: #60a5fa;
            background: #1e293b;
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            margin-top: 6px;
        }

        .card-stats {
            display: flex;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(71,85,105,0.4);
            border-bottom: 1px solid rgba(71,85,105,0.4);
            font-weight: 600;
        }

        .total-questions {
            color: #a5f3c3;
            background: #0f2f1f;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .sample-badge {
            color: #facc15;
            font-size: 0.75rem;
        }

        .action-btn {
            background: #0f172a;
            margin: 1.2rem 1.5rem 1.5rem 1.5rem;
            text-align: center;
            padding: 0.7rem;
            border-radius: 2rem;
            font-weight: 600;
            color: #bbf0ff;
            border: 1px solid #2d3a5e;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #2563eb;
            color: white;
            border-color: #60a5fa;
        }

        .quiz-panel {
            background: #0b1120e6;
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid #334155;
            padding: 1.8rem;
            margin-top: 1rem;
            transition: all 0.2s;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #2d3a5e;
            padding-bottom: 0.8rem;
        }

        .quiz-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: #cbd5e6;
        }

        .question-counter {
            background: #1e293b;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            color: #94a3b8;
            font-weight: 500;
        }

        .quiz-question-text {
            font-size: 1.4rem;
            font-weight: 500;
            margin: 1.2rem 0 1.5rem 0;
            color: #f0f3fa;
            line-height: 1.4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1.2rem 0;
        }

        .option-item {
            background: #111827;
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            border: 1px solid #2d3748;
            transition: all 0.15s;
            cursor: pointer;
            color: #e2e8f0;
            font-weight: 500;
        }

        .option-item:hover {
            background: #1f2a44;
            border-color: #3b82f6;
            transform: scale(0.99);
        }

        .option-correct {
            background: #0f3b2c;
            border-color: #2ecc71;
            color: #ccf0e0;
        }

        .option-wrong {
            background: #4a1e2c;
            border-color: #f97373;
            color: #ffe0e0;
            text-decoration: line-through;
        }

        .explanation-box {
            background: #030712cc;
            border-radius: 1.2rem;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 4px solid #3b82f6;
            font-style: italic;
            color: #b9c7db;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            margin-top: 1.2rem;
        }

        .quiz-btn {
            background: #1e293b;
            border: none;
            padding: 0.7rem 1.3rem;
            border-radius: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .quiz-btn-primary {
            background: #2563eb;
        }

        .quiz-btn-primary:hover {
            background: #1d4ed8;
        }

        .reset-quiz {
            background: #334155;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #475569;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <h1>⚡ IntelliTest ⚡</h1>
        <p>Harbiy aloqa instituti — 5 fan bo'yicha tayyorgarlik</p>
        <div class="status-badge" id="globalStatus">
            <span>📡</span> Yuklanmoqda... <span id="retryMsg"></span>
        </div>
    </div>

    <div id="subjectsContainer" class="subjects-grid"></div>
    <div id="quizArea" class="quiz-panel" style="display: none;"></div>
    <div class="footer-note">✔ Har bir fan: 20 ta namunaviy savol + keyin qo'shimcha 80 ta to'ldiriladi | Savollar random tartibda</div>
</div>

<script src="questions.js"></script>
<script>
    (function(){
        let quizDataLoaded = false;
        let quizLibrary = null;      
        let retryInterval = null;
        let currentSubjectId = null;
        let currentShuffledQuestions = [];  
        let currentQuestionIndex = 0;
        let answerLock = false;      
        let selectedAnswerTemp = null; 

        const subjectsMeta = [
            { id: 0, name: "📐 Matematika", desc: "Logarifm, hosila, integral, stereometriya" },
            { id: 1, name: "⚡ Fizika", desc: "Magnetizm, elektrodinamika, optika" },
            { id: 2, name: "💻 Dasturlash", desc: "C++, Python, Algoritmlar (TATU 1-kurs)" },
            { id: 3, name: "📜 Tarix", desc: "11-sinf O'zbekiston va Jahon tarixi" },
            { id: 4, name: "🇬🇧 Ingliz tili", desc: "Harbiy-texnik terminologiya va grammatika" }
        ];

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function updateGlobalStatus(loaded) {
            const statusDiv = document.getElementById('globalStatus');
            if (!statusDiv) return;
            if (loaded && quizLibrary) {
                let total = 0;
                for(let i=0;i<5;i++) total += (quizLibrary[i] ? quizLibrary[i].length : 0);
                statusDiv.innerHTML = `<span>✅</span> Baza yuklandi | Jami ${total} ta savol (har fandagi 20 namunaviy) <span id="retryMsg"></span>`;
            } else {
                statusDiv.innerHTML = `<span>⏳</span> Kutilyapti: questions.js... <span id="retryMsg" class="retry-log">🔄 tekshirilmoqda 500ms</span>`;
            }
        }

        function renderSubjects() {
            const container = document.getElementById('subjectsContainer');
            if(!container) return;
            if(!quizLibrary || !quizDataLoaded){
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#aaa;">⏳ Ma'lumot kutilmoqda, qayta urinish...</div>`;
                return;
            }
            let html = '';
            for(let sub of subjectsMeta){
                let questionsCount = (quizLibrary[sub.id] && Array.isArray(quizLibrary[sub.id])) ? quizLibrary[sub.id].length : 0;
                html += `
                    <div class="subject-card" data-id="${sub.id}">
                        <div class="card-header">
                            <div class="subject-name">${sub.name}</div>
                            <div class="subject-id">ID: ${sub.id} • ${sub.desc}</div>
                        </div>
                        <div class="card-stats">
                            <span class="total-questions">📚 Savollar: ${questionsCount}</span>
                            <span class="sample-badge">⭐ 20 ta namuna (qolgani keyin)</span>
                        </div>
                        <div class="action-btn" data-start="${sub.id}">▶ Testni boshlash</div>
                    </div>
                `;
            }
            container.innerHTML = html;

            document.querySelectorAll('[data-start]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    let subId = parseInt(btn.getAttribute('data-start'));
                    startQuizForSubject(subId);
                });
            });
            document.querySelectorAll('.subject-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if(e.target.classList && e.target.classList.contains('action-btn')) return;
                    let idAttr = card.getAttribute('data-id');
                    if(idAttr !== null) startQuizForSubject(parseInt(idAttr));
                });
            });
        }

        function startQuizForSubject(subjectId) {
            if(!quizLibrary || !quizLibrary[subjectId] || quizLibrary[subjectId].length === 0){
                alert(`⚠ ${subjectsMeta.find(s=>s.id===subjectId)?.name || 'Fan'} bo'yicha hali savollar mavjud emas (kamida 20 ta namuna bo'lishi kerak). Iltimos, keyinroq tekshiring.`);
                return;
            }
            currentSubjectId = subjectId;
            let originalQuestions = [...quizLibrary[subjectId]];
            currentShuffledQuestions = shuffleArray(originalQuestions);
            currentQuestionIndex = 0;
            answerLock = false;
            selectedAnswerTemp = null;
            renderQuizInterface();
            const quizDiv = document.getElementById('quizArea');
            if(quizDiv) quizDiv.style.display = 'block';
            window.scrollTo({ top: document.querySelector('.quiz-panel')?.offsetTop - 20, behavior: 'smooth' });
        }

        function renderQuizInterface() {
            const quizContainer = document.getElementById('quizArea');
            if(!quizContainer) return;
            if(!currentShuffledQuestions.length || currentSubjectId === null){
                quizContainer.innerHTML = `<div style="text-align:center; padding:2rem;">❌ Savollar topilmadi</div>`;
                quizContainer.style.display = 'block';
                return;
            }
            const questionObj = currentShuffledQuestions[currentQuestionIndex];
            if(!questionObj){
                quizContainer.innerHTML = `<div style="text-align:center; padding:2rem;">🏁 Test yakunlandi! 🏁<br><button class="quiz-btn reset-quiz" id="closeQuizBtn">Yopish</button></div>`;
                const closeBtn = document.getElementById('closeQuizBtn');
                if(closeBtn) closeBtn.onclick = () => { document.getElementById('quizArea').style.display = 'none'; };
                return;
            }
            const subjectName = subjectsMeta.find(s=>s.id===currentSubjectId)?.name || 'Fan';
            const totalQ = currentShuffledQuestions.length;
            let optionsHtml = '';
            const opts = questionObj.options || [];
            for(let i=0;i<opts.length;i++){
                let optText = opts[i];
                let additionalClass = '';
                if(answerLock){
                    if(optText === questionObj.answer){
                        additionalClass = 'option-correct';
                    } else if(selectedAnswerTemp === optText && optText !== questionObj.answer){
                        additionalClass = 'option-wrong';
                    }
                }
                optionsHtml += `<div class="option-item ${additionalClass}" data-opt="${escapeHtml(optText)}">${String.fromCharCode(65+i)}. ${escapeHtml(optText)}</div>`;
            }
            let explanationHtml = '';
            if(answerLock && questionObj.explanation){
                explanationHtml = `<div class="explanation-box">📘 Izoh: ${escapeHtml(questionObj.explanation)}</div>`;
            }
            let nextDisabled = !answerLock ? 'disabled style="opacity:0.5;"' : '';
            let prevDisabled = (currentQuestionIndex === 0 && !answerLock) ? 'disabled style="opacity:0.5;"' : '';
            quizContainer.innerHTML = `
                <div class="quiz-header">
                    <div class="quiz-title">${escapeHtml(subjectName)}</div>
                    <div class="question-counter">Savol ${currentQuestionIndex+1} / ${totalQ}</div>
                </div>
                <div class="quiz-question-text">❓ ${escapeHtml(questionObj.question)}</div>
                <div class="options-list" id="dynamicOptions">
                    ${optionsHtml}
                </div>
                ${explanationHtml}
                <div class="nav-buttons">
                    <button class="quiz-btn" id="prevQuestionBtn" ${currentQuestionIndex === 0 ? 'disabled' : ''}>◀ Oldingi</button>
                    <button class="quiz-btn quiz-btn-primary" id="nextQuestionBtn" ${nextDisabled}>Keyingi ▶</button>
                    <button class="quiz-btn reset-quiz" id="resetCurrentQuiz">🔄 Boshqa fan</button>
                </div>
            `;
            const optsContainer = document.getElementById('dynamicOptions');
            if(optsContainer && !answerLock){
                const optionDivs = optsContainer.querySelectorAll('.option-item');
                optionDivs.forEach(div => {
                    div.addEventListener('click', (e) => {
                        if(answerLock) return;
                        const selectedValue = div.getAttribute('data-opt');
                        if(!selectedValue) return;
                        selectedAnswerTemp = selectedValue;
                        const isCorrect = (selectedValue === questionObj.answer);
                        answerLock = true;
                        renderQuizInterface();
                        if(!isCorrect){
                            setTimeout(() => {
                                if(document.getElementById('nextQuestionBtn')) return;
                            },10);
                        }
                    });
                });
            }
            document.getElementById('prevQuestionBtn')?.addEventListener('click', () => {
                if(currentQuestionIndex > 0){
                    currentQuestionIndex--;
                    answerLock = false;
                    selectedAnswerTemp = null;
                    renderQuizInterface();
                }
            });
            document.getElementById('nextQuestionBtn')?.addEventListener('click', () => {
                if(!answerLock){
                    alert("Iltimos, avval javobni tanlang!");
                    return;
                }
                if(currentQuestionIndex + 1 < currentShuffledQuestions.length){
                    currentQuestionIndex++;
                    answerLock = false;
                    selectedAnswerTemp = null;
                    renderQuizInterface();
                } else {
                    if(currentQuestionIndex + 1 === currentShuffledQuestions.length){
                        alert(`🎉 Tabriklaymiz! "${subjectName}" fanidan barcha savollarni yakunladingiz! 🎉`);
                        currentQuestionIndex++;
                        renderQuizInterface();
                    } else {
                        renderQuizInterface();
                    }
                }
            });
            document.getElementById('resetCurrentQuiz')?.addEventListener('click', () => {
                document.getElementById('quizArea').style.display = 'none';
                currentSubjectId = null;
                answerLock = false;
            });
        }

        function escapeHtml(str){
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m){
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c){
                return c;
            });
        }

        function checkAndLoadData(){
            if(typeof window.QUIZ_DATA !== 'undefined' && window.QUIZ_DATA && typeof window.QUIZ_DATA === 'object'){
                if(!quizDataLoaded){
                    quizLibrary = window.QUIZ_DATA;
                    let isValid = true;
                    for(let i=0;i<5;i++){
                        if(!quizLibrary[i] || !Array.isArray(quizLibrary[i]) || quizLibrary[i].length < 20){
                            console.warn(`Fan ${i} da kamida 20 ta savol bormi?`, quizLibrary[i]?.length);
                            if(!quizLibrary[i]) quizLibrary[i]=[];
                        }
                    }
                    quizDataLoaded = true;
                    updateGlobalStatus(true);
                    renderSubjects();
                    if(retryInterval){
                        clearInterval(retryInterval);
                        retryInterval = null;
                    }
                }
            } else {
                if(!quizDataLoaded){
                    updateGlobalStatus(false);
                }
            }
        }

        function startRetryMechanism(){
            if(retryInterval) clearInterval(retryInterval);
            retryInterval = setInterval(() => {
                checkAndLoadData();
                if(quizDataLoaded && quizLibrary){
                    if(retryInterval) clearInterval(retryInterval);
                    retryInterval = null;
                }
            }, 500);
            checkAndLoadData();
        }

        startRetryMechanism();
        window.addEventListener('load', function(){
            checkAndLoadData();
        });
    })();
</script>
</body>
</html>
