<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster Pro — Natijalar</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #4f46e5;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #ffffff;
            --bg-secondary: #f3f4f6;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --card-bg: #ffffff;
            --card-border: #e5e7eb;
        }
        
        body.dark-mode {
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --card-bg: #1e293b;
            --card-border: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s;
        }
        
        .result-wrapper { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 30px;
        }
        
        .result-header h1 span { color: var(--accent); }
        
        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--card-border);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            color: var(--text);
        }
        
        /* Score Circle */
        .score-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        
        .circular-chart {
            width: 250px;
            height: 250px;
            transform: rotate(-90deg);
        }
        
        .circle-bg {
            stroke: var(--card-border);
            stroke-width: 12;
            fill: none;
        }
        
        .circle-progress {
            stroke: var(--primary);
            stroke-width: 12;
            fill: none;
            stroke-linecap: round;
            transition: stroke-dasharray 1s ease-out;
        }
        
        .score-text {
            font-size: 48px;
            font-weight: bold;
            fill: var(--text);
            transform: rotate(90deg);
        }
        
        .score-percent {
            font-size: 20px;
            fill: var(--text-secondary);
            transform: rotate(90deg);
        }
        
        /* Stats Grid */
        .result-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-box {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        /* Feedback Card */
        .feedback-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark, #4338ca));
            border-radius: 24px;
            padding: 30px;
            margin: 30px 0;
            color: white;
            text-align: center;
        }
        
        .feedback-icon { font-size: 48px; margin-bottom: 15px; }
        .feedback-message { font-size: 18px; line-height: 1.5; margin-bottom: 15px; }
        .feedback-advice { font-size: 14px; opacity: 0.9; }
        
        /* Details Table */
        .details-section {
            margin: 30px 0;
        }
        
        .details-title {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .details-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-secondary);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .details-table th,
        .details-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }
        
        .details-table th {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }
        
        .details-table tr:hover {
            background: var(--card-border);
        }
        
        .status-correct {
            color: var(--success);
            font-weight: bold;
        }
        
        .status-wrong {
            color: var(--danger);
            font-weight: bold;
        }
        
        .user-answer-correct {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            padding: 4px 8px;
            border-radius: 8px;
            display: inline-block;
        }
        
        .user-answer-wrong {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            padding: 4px 8px;
            border-radius: 8px;
            display: inline-block;
        }
        
        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }
        
        .btn {
            padding: 14px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text);
            border: 1px solid var(--card-border);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .result-stats { grid-template-columns: repeat(2, 1fr); }
            .details-table th, .details-table td { padding: 10px; font-size: 12px; }
            .btn-group { flex-direction: column; align-items: center; }
            .btn { width: 200px; text-align: center; }
        }
        
        @media (max-width: 500px) {
            .result-stats { grid-template-columns: 1fr; }
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fadeInUp {
            animation: fadeInUp 0.5s ease-out forwards;
        }
    </style>
</head>
<body>

<div class="result-wrapper">
    <div class="result-header">
        <h1>📊 <span>QuizMaster</span> Pro</h1>
        <button id="theme-toggle-btn" class="theme-toggle">🌙 Dark</button>
    </div>

    <div id="result-content">
        <!-- Dinamik kontent -->
    </div>
</div>

<script src="app.js?v=3.0"></script>
