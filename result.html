<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster Pro — Natijalar</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Asosiy CSS (root papkada) -->
    <link rel="stylesheet" href="style.css?v=1.2">
    
    <style>
        :root {
            --primary: #4f46e5;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #ffffff;
            --bg-secondary: #f3f4f6;
            --text: #1f2937;
        }
        
        body.dark-mode {
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --text: #f1f5f9;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s;
        }
        
        .result-wrapper { max-width: 600px; margin: 0 auto; padding: 20px; }
        .result-header { text-align: center; padding: 40px 0; border-bottom: 1px solid #e5e7eb; margin-bottom: 30px; }
        .score-circle { width: 200px; height: 200px; margin: 0 auto 20px; }
        .score-percent { font-size: 48px; font-weight: bold; color: var(--primary); }
        .score-label { font-size: 18px; color: var(--text-secondary); }
        .result-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin: 30px 0; }
        .stat-box { background: var(--bg-secondary); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .btn { padding: 12px 24px; border-radius: 30px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--bg-secondary); color: var(--text); border: 1px solid #ccc; }
        
        @media (max-width: 500px) {
            .result-stats { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="result-wrapper">
    <div class="result-header">
        <h1>📊 Test <span style="color: var(--accent);">Natijalari</span></h1>
    </div>

    <div id="result-content">
        <div style="text-align: center; padding: 40px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 48px; color: var(--primary);"></i>
            <p style="margin-top: 20px;">Natijalar yuklanmoqda...</p>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- ROOT PAPKASIDAGI FAYLLAR (papkalarsiz)                       -->
<!-- ============================================================ -->

<script src="result.js?v=1.2"></script>

</body>
</html>
