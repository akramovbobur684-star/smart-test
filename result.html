<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natijalar - QuizArena</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-light: #f8fafc;
            --surface-light: #ffffff;
            --text-light: #0f172a;
            --border-light: #e2e8f0;
            --bg-dark: #0f172a;
            --surface-dark: #1e293b;
            --text-dark: #f1f5f9;
            --border-dark: #334155;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        .result-container {
            max-width: 600px;
            width: 90%;
            margin: 40px auto;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            background: var(--surface-light);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        body.dark .result-card {
            background: var(--surface-dark);
            border-color: var(--border-dark);
        }

        .score-circle {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            position: relative;
        }

        .score-circle svg {
            transform: rotate(-90deg);
        }

        .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .percentage {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat-item {
            background: var(--bg-light);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        body.dark .stat-item {
            background: var(--bg-dark);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary-light);
            margin-bottom: 8px;
        }

        body.dark .stat-label {
            color: var(--text-secondary-dark);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-value.correct {
            color: var(--success);
        }

        .stat-value.wrong {
            color: var(--danger);
        }

        .message {
            background: var(--warning);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--surface-light);
            color: var(--text-light);
            border: 1px solid var(--border-light);
        }

        body.dark .btn-secondary {
            background: var(--surface-dark);
            color: var(--text-dark);
            border-color: var(--border-dark);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .result-card {
                padding: 20px;
            }
            
            .stats-grid {
                gap: 12px;
            }
            
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="result-container">
        <div class="result-card">
            <h1>🎯 Test natijalari</h1>
            
            <div class="score-circle">
                <svg width="200" height="200">
                    <circle cx="100" cy="100" r="90" fill="none" stroke="var(--border-light)" stroke-width="12"/>
                    <circle cx="100" cy="100" r="90" fill="none" stroke="var(--primary)" stroke-width="12" 
                            stroke-dasharray="565.48" stroke-dashoffset="565.48" id="progressCircle"/>
                </svg>
                <div class="score-text">
                    <div class="percentage" id="percentage">0%</div>
                    <div>To'g'ri javoblar</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">Jami savollar</div>
                    <div class="stat-value" id="totalQuestions">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">To'g'ri javoblar</div>
                    <div class="stat-value correct" id="correctAnswers">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Noto'g'ri javoblar</div>
                    <div class="stat-value wrong" id="wrongAnswers">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">O'tkazilgan vaqt</div>
                    <div class="stat-value" id="timeSpent">0:00</div>
                </div>
            </div>

            <div id="messageContainer"></div>

            <div class="btn-group">
                <a href="index.html" class="btn btn-primary">🔄 Qayta boshlash</a>
                <button class="btn btn-secondary" id="themeToggle">🌙 Dark mode</button>
            </div>
        </div>
    </div>

    <script src="questions.js" defer></script>
    <script src="result.js" defer></script>
</body>
</html>
