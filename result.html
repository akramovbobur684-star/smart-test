<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster Pro — Test Natijalari</title>
    
    <!-- Font Awesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Asosiy style.css (root papkada) -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Qo'shimcha stillar — result sahifasi uchun maxsus */
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #ffffff;
            --bg-secondary: #f3f4f6;
            --bg-tertiary: #e5e7eb;
            --text: #111827;
            --text-secondary: #6b7280;
            --card-bg: #ffffff;
            --card-border: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --card-bg: #1e293b;
            --card-border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color var(--transition-base), color var(--transition-base);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ========== NAVBAR ========== */
        .navbar {
            padding: 16px 0;
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(var(--bg-rgb, 255, 255, 255), 0.85);
        }

        body.dark-mode .navbar {
            background-color: rgba(15, 23, 42, 0.85);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }

        .brand-icon {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--card-border);
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition-base);
            font-size: 14px;
            color: var(--text);
        }

        .theme-toggle:hover {
            transform: scale(1.02);
        }

        /* ========== SCORE CIRCLE ========== */
        .score-container {
            display: flex;
            justify-content: center;
            margin: 40px 0 30px;
        }

        .circular-chart {
            width: 260px;
            height: 260px;
            transform: rotate(-90deg);
        }

        .circle-bg {
            stroke: var(--bg-tertiary);
            stroke-width: 12;
            fill: none;
        }

        .circle-progress {
            stroke-width: 12;
            fill: none;
            stroke-linecap: round;
            transition: stroke-dasharray 1.2s ease-out;
        }

        .score-text {
            font-size: 52px;
            font-weight: 800;
            fill: var(--text);
            transform: rotate(90deg);
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .score-percent {
            font-size: 20px;
            fill: var(--text-secondary);
            transform: rotate(90deg);
            text-anchor: middle;
            dominant-baseline: middle;
        }

        /* ========== STATS GRID ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--card-border);
            transition: var(--transition-base);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ========== FEEDBACK CARD ========== */
        .feedback-card {
            border-radius: 24px;
            padding: 30px;
            margin: 30px 0;
            color: white;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .feedback-icon {
            font-size: 52px;
            margin-bottom: 16px;
        }

        .feedback-message {
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .feedback-advice {
            font-size: 14px;
            opacity: 0.9;
        }

        .feedback-expert { background: linear-gradient(135deg, #10b981, #059669); }
        .feedback-good { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .feedback-average { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .feedback-poor { background: linear-gradient(135deg, #ef4444, #dc2626); }

        /* ========== DETAILS TABLE ========== */
        .details-section {
            margin: 30px 0;
        }

        .details-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .details-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-details {
            background: var(--bg-secondary);
            border: 1px solid var(--card-border);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text);
            transition: var(--transition-base);
        }

        .toggle-details:hover {
            border-color: var(--primary);
        }

        .details-table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            display: none;
        }

        .details-table-wrapper.show {
            display: block;
            animation: fadeInUp 0.4s ease-out;
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-secondary);
            border-radius: 16px;
            overflow: hidden;
        }

        .details-table th,
        .details-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }

        .details-table th {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }

        .details-table tr:hover {
            background: var(--bg-tertiary);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-correct {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .status-wrong {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .correct-answer {
            color: var(--success);
            font-weight: 600;
        }

        /* ========== BUTTONS ========== */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 30px 0 50px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition-base);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text);
            border: 1px solid var(--card-border);
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid var(--card-border);
            margin-top: 20px;
        }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeInUp {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        /* ========== LOADING ========== */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-secondary);
            border-radius: 24px;
            border: 1px solid var(--card-border);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .container { padding: 0 16px; }
            .stats-grid { grid-template-columns: 1fr; gap: 12px; }
            .circular-chart { width: 200px; height: 200px; }
            .score-text { font-size: 40px; }
            .btn-group { flex-direction: column; align-items: center; }
            .btn { width: 200px; justify-content: center; }
            .details-table th, .details-table td { padding: 10px 12px; font-size: 12px; }
        }

        @media (max-width: 480px) {
            .feedback-message { font-size: 15px; }
            .stat-value { font-size: 22px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <div class="brand-icon">Q</div>
                <span>QuizMaster <span style="color: var(--accent);">Pro</span></span>
            </a>
            <button id="theme-toggle-btn" class="theme-toggle">🌙 Dark</button>
        </div>
    </nav>

    <main>
        <div class="container">
            <div id="result-content">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 QuizMaster Pro — Intellektual online test platformasi</p>
            <p style="font-size: 12px; margin-top: 8px; color: var(--text-secondary);">
                <i class="fas fa-microchip"></i> AI tomonidan shaxsiylashtirilgan ta'lim
            </p>
        </div>
    </footer>

    <!-- ============================================================ -->
    <!-- ROOT PAPKASIDAGI FAYLLAR (PAPKALARSIZ)                       -->
    <!-- ============================================================ -->
    
    <!-- 1️⃣ App.js (Dark Mode va umumiy funksiyalar) -->
    <script src="app.js"></script>
    
    <!-- 2️⃣ Result sahifasi mantiqi (ichki) -->
    <script>
        (function() {
            'use strict';

            // -------------------------------------------------------
            // 1. URL PARAMETRLARNI OLISH
            // -------------------------------------------------------
            function getUrlParams() {
                const params = new URLSearchParams(window.location.search);
                return {
                    subject: params.get('subject') || 'Noma\'lum fan',
                    score: parseInt(params.get('score')) || 0,
                    total: parseInt(params.get('total')) || 0,
                    percent: parseInt(params.get('percent')) || 0,
                    time: parseInt(params.get('time')) || 0
                };
            }

            // -------------------------------------------------------
            // 2. FOIZGA QARAB RANG OLISH
            // -------------------------------------------------------
            function getScoreColor(percent) {
                if (percent >= 80) return '#10b981';
                if (percent >= 60) return '#f59e0b';
                if (percent >= 40) return '#f97316';
                return '#ef4444';
            }

            // -------------------------------------------------------
            // 3. INTELLEKTUAL FEEDBACK
            // -------------------------------------------------------
            function getSmartFeedback(percent, subject) {
                if (percent >= 90) {
                    return {
                        icon: 'fa-crown',
                        message: `🎉 Ajoyib! Siz ${subject} fanini mukammal o'zlashtirgansiz!`,
                        advice: 'Siz ushbu fan bo\'yicha mutaxassis darajasidasiz. Keyingi qiyinroq testlarni sinab ko\'ring!',
                        type: 'expert'
                    };
                } else if (percent >= 75) {
                    return {
                        icon: 'fa-star',
                        message: `👍 Juda yaxshi! ${subject} fanidan bilimingiz mustahkam.`,
                        advice: 'Xato qilgan savollaringizni tahlil qiling va bilimingizni yanada mustahkamlang.',
                        type: 'good'
                    };
                } else if (percent >= 60) {
                    return {
                        icon: 'fa-thumbs-up',
                        message: `📚 Yaxshi natija! ${subject} fanini yaxshi bilasiz, ammo ozgina takrorlash kerak.`,
                        advice: 'Asosiy mavzularni bir marta ko\'rib chiqish va testni qayta topshirish tavsiya etiladi.',
                        type: 'average'
                    };
                } else if (percent >= 40) {
                    return {
                        icon: 'fa-book-open',
                        message: `📖 O'rtacha natija. ${subject} faniga ko'proq e'tibor qaratishingiz kerak.`,
                        advice: 'Nazariy materiallarni o\'qib chiqing va amaliy mashqlarni ko\'paytiring. Taslim bo\'lmang!',
                        type: 'poor'
                    };
                } else {
                    return {
                        icon: 'fa-chart-line',
                        message: `⚠️ Siz ${subject} fanidan ko'proq mashq qilishingiz kerak.`,
                        advice: 'Boshlang\'ich darajadagi materiallardan o\'rganishni boshlang va testni qayta topshiring. Har bir xato — o\'rganish imkoniyati!',
                        type: 'very-poor'
                    };
                }
            }

            // -------------------------------------------------------
            // 4. VAQTNI FORMATLASH (MM:SS)
            // -------------------------------------------------------
            function formatTime(seconds) {
                if (isNaN(seconds) || seconds < 0) return '00:00';
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            // -------------------------------------------------------
            // 5. LOCALSTORAGEDAN NATIJALARNI OLISH (TAHLIL UCHUN)
            // -------------------------------------------------------
            function getLatestResultForSubject(subjectName) {
                try {
                    const stored = localStorage.getItem('qm_results');
                    if (!stored) return null;
                    const results = JSON.parse(stored);
                    return results.find(r => r.subject === subjectName) || results[0] || null;
                } catch (e) {
                    console.error('LocalStorage dan o\'qishda xatolik:', e);
                    return null;
                }
            }

            // -------------------------------------------------------
            // 6. SVG DIAGRAMMANI CHIZISH
            // -------------------------------------------------------
            let animationInterval = null;

            function renderScoreCircle(percent) {
                const radius = 115;
                const circumference = 2 * Math.PI * radius;
                const color = getScoreColor(percent);
                
                return `
                    <div class="score-container">
                        <svg viewBox="0 0 260 260" class="circular-chart">
                            <circle cx="130" cy="130" r="${radius}" class="circle-bg"></circle>
                            <circle cx="130" cy="130" r="${radius}" class="circle-progress" 
                                    style="stroke-dasharray: ${circumference}; stroke-dashoffset: ${circumference}; stroke: ${color};"
                                    id="progress-circle"></circle>
                            <text x="130" y="130" class="score-text" id="score-text">0</text>
                            <text x="130" y="155" class="score-percent">%</text>
                        </svg>
                    </div>
                `;
            }

            function animateCircle(percent) {
                const radius = 115;
                const circumference = 2 * Math.PI * radius;
                const targetOffset = circumference - (percent / 100) * circumference;
                const textElement = document.getElementById('score-text');
                const circleElement = document.getElementById('progress-circle');
                
                if (!circleElement || !textElement) return;
                
                if (animationInterval) clearInterval(animationInterval);
                
                let currentPercent = 0;
                const duration = 1000;
                const stepTime = 20;
                const steps = duration / stepTime;
                const increment = percent / steps;
                
                animationInterval = setInterval(() => {
                    currentPercent += increment;
                    if (currentPercent >= percent) {
                        currentPercent = percent;
                        clearInterval(animationInterval);
                        animationInterval = null;
                    }
                    
                    const currentOffset = circumference - (currentPercent / 100) * circumference;
                    circleElement.style.strokeDashoffset = currentOffset;
                    textElement.textContent = Math.round(currentPercent);
                }, stepTime);
            }

            // -------------------------------------------------------
            // 7. STATISTIKA PANELI
            // -------------------------------------------------------
            function renderStats(score, total, timeSpent) {
                const correctPercent = total > 0 ? Math.round((score / total) * 100) : 0;
                
                return `
                    <div class="stats-grid">
                        <div class="stat-card animate-fadeInUp" style="animation-delay: 0.1s">
                            <div class="stat-icon"><i class="fas fa-check-circle" style="color: var(--success);"></i></div>
                            <div class="stat-value">${score} / ${total}</div>
                            <div class="stat-label">To'g'ri javoblar</div>
                        </div>
                        <div class="stat-card animate-fadeInUp" style="animation-delay: 0.2s">
                            <div class="stat-icon"><i class="fas fa-percent" style="color: var(--primary);"></i></div>
                            <div class="stat-value">${correctPercent}%</div>
                            <div class="stat-label">To'g'ri javoblar foizi</div>
                        </div>
                        <div class="stat-card animate-fadeInUp" style="animation-delay: 0.3s">
                            <div class="stat-icon"><i class="fas fa-hourglass-half" style="color: var(--accent);"></i></div>
                            <div class="stat-value">${formatTime(timeSpent)}</div>
                            <div class="stat-label">Sarflangan vaqt</div>
                        </div>
                    </div>
                `;
            }

            // -------------------------------------------------------
            // 8. FEEDBACK KARTOCHKASI
            // -------------------------------------------------------
            function renderFeedback(percent, subject) {
                const feedback = getSmartFeedback(percent, subject);
                const feedbackClass = feedback.type === 'expert' ? 'feedback-expert' :
                                     feedback.type === 'good' ? 'feedback-good' :
                                     feedback.type === 'average' ? 'feedback-average' : 'feedback-poor';
                
                return `
                    <div class="feedback-card ${feedbackClass} animate-fadeInUp" style="animation-delay: 0.4s">
                        <div class="feedback-icon"><i class="fas ${feedback.icon}"></i></div>
                        <div class="feedback-message">${feedback.message}</div>
                        <div class="feedback-advice"><i class="fas fa-lightbulb"></i> ${feedback.advice}</div>
                    </div>
                `;
            }

            // -------------------------------------------------------
            // 9. TAHILIL JADVALI (REVIEW) — SAVOLLAR RO'YXATI
            // -------------------------------------------------------
            function renderDetailsTable(subjectName, userScore, userTotal) {
                const result = getLatestResultForSubject(subjectName);
                
                // Agar localStorage'da batafsil ma'lumot bo'lmasa, faqat umumiy ma'lumot ko'rsatiladi
                if (!result || !result.details || result.details.length === 0) {
                    return `
                        <div class="details-section">
                            <div class="details-header">
                                <div class="details-title">
                                    <i class="fas fa-chart-simple"></i> Savollar tahlili
                                </div>
                            </div>
                            <div class="empty-state">
                                <i class="fas fa-info-circle" style="font-size: 48px; margin-bottom: 15px; color: var(--text-secondary);"></i>
                                <p>Batafsil tahlil uchun test natijasi localStorage'da saqlanmagan.</p>
                                <p style="font-size: 13px; margin-top: 10px;">Keyingi testlarda batafsil tahlil ko'rsatiladi.</p>
                                <p style="font-size: 13px; margin-top: 5px;">Sizning natijangiz: ${userScore}/${userTotal}</p>
                            </div>
                        </div>
                    `;
                }
                
                let correctCount = 0;
                let tableRows = '';
                
                result.details.forEach((item, idx) => {
                    const isCorrect = item.isCorrect;
                    if (isCorrect) correctCount++;
                    const questionText = item.question || `Savol ${idx + 1}`;
                    const shortQuestion = questionText.length > 70 ? questionText.substring(0, 70) + '...' : questionText;
                    
                    tableRows += `
                        <tr>
                            <td style="width: 50px; text-align: center;">${idx + 1}</td>
                            <td>${escapeHtml(shortQuestion)}</td>
                            <td style="width: 100px;">
                                <span class="status-badge ${isCorrect ? 'status-correct' : 'status-wrong'}">
                                    <i class="fas ${isCorrect ? 'fa-check' : 'fa-times'}"></i>
                                    ${isCorrect ? 'To\'g\'ri' : 'Xato'}
                                </span>
                            </td>
                            <td style="width: 150px;">
                                <span class="correct-answer"><i class="fas fa-check-circle"></i> ${escapeHtml(item.correctAnswer)}</span>
                            </td>
                        </tr>
                    `;
                });
                
                return `
                    <div class="details-section">
                        <div class="details-header">
                            <div class="details-title">
                                <i class="fas fa-chart-simple"></i> Savollar tahlili (${result.details.length} ta savol)
                                <span style="font-size: 14px; font-weight: normal; margin-left: 10px;">
                                    <i class="fas fa-check-circle" style="color: var(--success);"></i> ${correctCount} to'g'ri
                                    <i class="fas fa-times-circle" style="color: var(--danger); margin-left: 8px;"></i> ${result.details.length - correctCount} xato
                                </span>
                            </div>
                            <button class="toggle-details" id="toggle-details-btn">
                                <i class="fas fa-chevron-down"></i> Ko'rish
                            </button>
                        </div>
                        <div class="details-table-wrapper" id="details-table-wrapper">
                            <table class="details-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Savol</th>
                                        <th>Holat</th>
                                        <th>To'g'ri javob</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${tableRows}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
            
            function escapeHtml(str) {
                if (!str) return '';
                return str
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            // -------------------------------------------------------
            // 10. HARAKAT TUGMALARI
            // -------------------------------------------------------
            function renderButtons(subjectName) {
                // Subject indeksini topish (qayta topshirish uchun)
                let subjectIndex = 0;
                if (window.QUIZ_DATA) {
                    const found = window.QUIZ_DATA.findIndex(s => s.subject === subjectName);
                    if (found !== -1) subjectIndex = found;
                }
                
                return `
                    <div class="btn-group">
                        <button class="btn btn-primary" id="retake-btn">
                            <i class="fas fa-rotate-right"></i> Qayta topshirish
                        </button>
                        <a href="index.html" class="btn btn-secondary">
                            <i class="fas fa-home"></i> Bosh sahifaga
                        </a>
                    </div>
                `;
            }

            // -------------------------------------------------------
            // 11. DARK MODE (app.js bilan sinxron)
            // -------------------------------------------------------
            function initDarkMode() {
                const savedTheme = localStorage.getItem('quiz_theme');
                const isDark = savedTheme === 'dark' || (savedTheme === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
                const themeBtn = document.getElementById('theme-toggle-btn');
                
                if (isDark) {
                    document.body.classList.add('dark-mode');
                    if (themeBtn) themeBtn.innerHTML = '☀️ Light';
                } else {
                    document.body.classList.remove('dark-mode');
                    if (themeBtn) themeBtn.innerHTML = '🌙 Dark';
                }
                
                if (themeBtn) {
                    themeBtn.addEventListener('click', () => {
                        const nowDark = document.body.classList.contains('dark-mode');
                        if (nowDark) {
                            document.body.classList.remove('dark-mode');
                            localStorage.setItem('quiz_theme', 'light');
                            themeBtn.innerHTML = '🌙 Dark';
                        } else {
                            document.body.classList.add('dark-mode');
                            localStorage.setItem('quiz_theme', 'dark');
                            themeBtn.innerHTML = '☀️ Light';
                        }
                    });
                }
            }

            // -------------------------------------------------------
            // 12. ASOSIY RENDER
            // -------------------------------------------------------
            function renderResultPage() {
                const params = getUrlParams();
                const { subject, score, total, percent, time } = params;
                
                console.log('Result params:', params);
                
                const container = document.getElementById('result-content');
                if (!container) return;
                
                container.innerHTML = `
                    ${renderScoreCircle(percent)}
                    ${renderStats(score, total, time)}
                    ${renderFeedback(percent, subject)}
                    ${renderDetailsTable(subject, score, total)}
                    ${renderButtons(subject)}
                `;
                
                // SVG animatsiyasini ishga tushirish
                setTimeout(() => {
                    animateCircle(percent);
                }, 100);
                
                // Tahlil jadvalini toggle qilish
                const toggleBtn = document.getElementById('toggle-details-btn');
                const tableWrapper = document.getElementById('details-table-wrapper');
                
                if (toggleBtn && tableWrapper) {
                    toggleBtn.addEventListener('click', () => {
                        tableWrapper.classList.toggle('show');
                        const icon = toggleBtn.querySelector('i');
                        if (tableWrapper.classList.contains('show')) {
                            icon.className = 'fas fa-chevron-up';
                            toggleBtn.innerHTML = '<i class="fas fa-chevron-up"></i> Yashirish';
                        } else {
                            icon.className = 'fas fa-chevron-down';
                            toggleBtn.innerHTML = '<i class="fas fa-chevron-down"></i> Ko\'rish';
                        }
                    });
                }
                
                // Qayta topshirish tugmasi
                const retakeBtn = document.getElementById('retake-btn');
                if (retakeBtn) {
                    retakeBtn.addEventListener('click', () => {
                        let subjectIndex = 0;
                        if (window.QUIZ_DATA) {
                            const found = window.QUIZ_DATA.findIndex(s => s.subject === subject);
                            if (found !== -1) subjectIndex = found;
                        }
                        window.location.href = `quiz.html?subject=${subjectIndex}`;
                    });
                }
            }

            // -------------------------------------------------------
            // 13. MA'LUMOTLAR BAZASINI KUTISH VA ISHGA TUSHIRISH
            // -------------------------------------------------------
            function init() {
                initDarkMode();
                
                // Agar app.js da QuizApp bo'lsa, undan foydalanish
                if (window.QuizApp && window.QuizApp.initDarkMode) {
                    // app.js allaqachon ishlaydi
                }
                
                // Ma'lumotlar bazasini kutmasdan darhol natijalarni ko'rsatish
                // (chunki result.html uchun QUIZ_DATA shart emas)
                renderResultPage();
            }
            
            init();
        })();
    </script>
</body>
</html>
