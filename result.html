<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster Pro — Intellektual Test Natijalari</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #ffffff;
            --bg-secondary: #f3f4f6;
            --bg-tertiary: #e5e7eb;
            --text: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --card-bg: #ffffff;
            --card-border: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --card-bg: #1e293b;
            --card-border: #334155;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background var(--transition-base), color var(--transition-base);
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Navbar */
        .navbar {
            padding: 16px 0;
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
        }

        body.dark-mode .navbar {
            background: rgba(15, 23, 42, 0.85);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }

        .brand-icon {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--card-border);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition-base);
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        .theme-toggle:hover {
            transform: scale(1.02);
            border-color: var(--primary);
        }

        /* Hero Section with Chart */
        .hero-section {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 32px;
            padding: 40px;
            margin: 30px 0;
            color: white;
            text-align: center;
        }

        .hero-title {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .hero-subtitle {
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .chart-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            align-items: center;
        }

        .chart-container {
            position: relative;
            width: 220px;
            height: 220px;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        .chart-stats {
            text-align: left;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px 30px;
        }

        .chart-stats p {
            margin: 8px 0;
            font-size: 16px;
        }

        .grade-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 20px;
            margin-top: 20px;
        }

        .grade-A { background: #10b981; }
        .grade-B { background: #3b82f6; }
        .grade-C { background: #f59e0b; }
        .grade-D { background: #f97316; }
        .grade-F { background: #ef4444; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--card-border);
            transition: var(--transition-base);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Feedback Card */
        .feedback-card {
            border-radius: 24px;
            padding: 32px;
            margin: 30px 0;
            color: white;
            text-align: center;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.5s ease-out;
        }

        .feedback-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .feedback-message {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .feedback-advice {
            font-size: 15px;
            opacity: 0.95;
        }

        .feedback-expert { background: linear-gradient(135deg, #10b981, #059669); }
        .feedback-good { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .feedback-average { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .feedback-poor { background: linear-gradient(135deg, #ef4444, #dc2626); }

        /* Details Section */
        .details-section {
            margin: 30px 0;
            background: var(--bg-secondary);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            overflow: hidden;
        }

        .details-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: var(--bg-tertiary);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .details-header:hover {
            background: var(--card-border);
        }

        .details-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-icon {
            transition: transform 0.3s;
        }

        .toggle-icon.rotated {
            transform: rotate(180deg);
        }

        .details-table-wrapper {
            display: none;
            overflow-x: auto;
        }

        .details-table-wrapper.show {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
        }

        .details-table th,
        .details-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }

        .details-table th {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }

        .details-table tr:hover {
            background: var(--bg-tertiary);
        }

        .status-correct {
            color: var(--success);
            font-weight: 600;
        }

        .status-wrong {
            color: var(--danger);
            font-weight: 600;
        }

        .answer-correct {
            background: rgba(16, 185, 129, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 13px;
        }

        .answer-wrong {
            background: rgba(239, 68, 68, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            font-size: 13px;
            text-decoration: line-through;
            margin-right: 8px;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 30px 0 50px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition-base);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text);
            border: 1px solid var(--card-border);
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: var(--shadow-lg);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid var(--card-border);
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-slideUp {
            animation: slideUp 0.5s ease-out forwards;
        }

        /* Loading */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 0 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .hero-section { padding: 24px; }
            .hero-title { font-size: 22px; }
            .chart-row { flex-direction: column; }
            .btn-group { flex-direction: column; align-items: center; }
            .btn { width: 220px; justify-content: center; }
            .details-table th, .details-table td { padding: 10px 12px; font-size: 12px; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .stat-value { font-size: 24px; }
            .feedback-message { font-size: 16px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="index.html" class="navbar-brand">
            <div class="brand-icon">Q</div>
            <span>QuizMaster <span style="color: var(--accent);">Pro</span></span>
        </a>
        <button id="theme-toggle-btn" class="theme-toggle">🌙 Dark</button>
    </div>
</nav>

<main>
    <div class="container">
        <div id="result-content">
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 QuizMaster Pro — Intellektual test platformasi</p>
        <p style="font-size: 12px; margin-top: 8px; color: var(--text-secondary);">
            <i class="fas fa-brain"></i> AI tomonidan shaxsiylashtirilgan ta'lim
        </p>
    </div>
</footer>

<script>
    (function() {
        'use strict';

        // ============================================================
        // INTELLEKTUAL RESULT SAHIFASI v4.0
        // Chart.js bilan professional diagramma
        // ============================================================

        let chartInstance = null;

        // URL parametrlarini olish
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                subject: params.get('subject') || 'Noma\'lum fan',
                score: parseInt(params.get('score')) || 0,
                total: parseInt(params.get('total')) || 25,
                percent: parseInt(params.get('percent')) || 0,
                time: parseInt(params.get('time')) || 0
            };
        }

        // Vaqtni formatlash
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Baho va rangni aniqlash
        function getGrade(percent) {
            if (percent >= 90) return { letter: 'A', text: 'Aʼlo', color: '#10b981' };
            if (percent >= 75) return { letter: 'B', text: 'Yaxshi', color: '#3b82f6' };
            if (percent >= 60) return { letter: 'C', text: 'Qoniqarli', color: '#f59e0b' };
            if (percent >= 45) return { letter: 'D', text: 'Qoniqarsiz', color: '#f97316' };
            return { letter: 'F', text: 'Yomon', color: '#ef4444' };
        }

        // Intellektual feedback
        function getSmartFeedback(percent, subject) {
            if (percent >= 90) {
                return {
                    icon: 'fa-crown',
                    message: `🎉 Tabriklaymiz! Siz ${subject} fanini mukammal o'zlashtirgansiz!`,
                    advice: 'Siz haqiqiy mutaxassissiz! Keyingi qiyinroq testlarni sinab ko\'ring.',
                    type: 'expert'
                };
            } else if (percent >= 75) {
                return {
                    icon: 'fa-star',
                    message: `👍 Ajoyib! ${subject} fanidan bilimingiz juda mustahkam.`,
                    advice: 'Kichik xatolaringizni tahlil qiling va bilimingizni yanada oshiring.',
                    type: 'good'
                };
            } else if (percent >= 60) {
                return {
                    icon: 'fa-thumbs-up',
                    message: `📚 Yaxshi natija! ${subject} fanini yaxshi bilasiz.`,
                    advice: 'Asosiy mavzularni takrorlash va testni qayta topshirish tavsiya etiladi.',
                    type: 'average'
                };
            } else if (percent >= 40) {
                return {
                    icon: 'fa-book-open',
                    message: `📖 O'rtacha natija. ${subject} faniga ko'proq e'tibor bering.`,
                    advice: 'Nazariy materiallarni o\'qing va ko\'proq mashq qiling. Taslim bo\'lmang!',
                    type: 'poor'
                };
            } else {
                return {
                    icon: 'fa-chart-line',
                    message: `⚠️ ${subject} fanidan ko'proq ishlashingiz kerak.`,
                    advice: 'Boshlang\'ich darajadan boshlang, har kuni mashq qiling. Muvaffaqiyat keladi!',
                    type: 'very-poor'
                };
            }
        }

        // Chart.js diagrammasini yaratish
        function createChart(correct, wrong) {
            const ctx = document.getElementById('result-chart')?.getContext('2d');
            if (!ctx) return;
            
            if (chartInstance) chartInstance.destroy();
            
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['To\'g\'ri javoblar', 'Xato javoblar'],
                    datasets: [{
                        data: [correct, wrong],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderWidth: 0,
                        hoverOffset: 15,
                        cutout: '65%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: getComputedStyle(document.body).getPropertyValue('--text'),
                                font: { size: 13, weight: '500' },
                                padding: 15,
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.label || '';
                                    const value = context.raw || 0;
                                    const total = correct + wrong;
                                    const percentage = total > 0 ? Math.round((value / total) * 100) : 0;
                                    return `${label}: ${value} ta (${percentage}%)`;
                                }
                            }
                        }
                    },
                    animation: {
                        animateRotate: true,
                        duration: 1000,
                        easing: 'easeOutBounce'
                    }
                }
            });
        }

        // LocalStorage dan oxirgi natijani olish
        function getLatestResult(subjectName) {
            try {
                const stored = localStorage.getItem('qm_results');
                if (!stored) return null;
                const results = JSON.parse(stored);
                return results.find(r => r.subject === subjectName) || null;
            } catch(e) {
                return null;
            }
        }

        // Tahlil jadvalini render qilish
        function renderDetailsTable(result, score, total) {
            if (!result || !result.details || result.details.length === 0) {
                return `
                    <div class="details-section">
                        <div class="details-header" onclick="toggleDetails()">
                            <div class="details-title">
                                <i class="fas fa-chart-simple"></i> Savollar tahlili
                                <span style="font-size: 13px; font-weight: normal;">(${score}/${total})</span>
                            </div>
                            <i class="fas fa-chevron-down toggle-icon" id="toggle-icon"></i>
                        </div>
                        <div class="details-table-wrapper" id="details-table">
                            <div style="text-align: center; padding: 40px;">
                                <i class="fas fa-info-circle" style="font-size: 48px; margin-bottom: 15px; color: var(--text-secondary);"></i>
                                <p>Batafsil tahlil ma'lumotlari topilmadi.</p>
                                <p style="font-size: 13px; margin-top: 10px;">Keyingi testlarda har bir savol tahlili ko'rsatiladi.</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            let correctCount = 0;
            let rows = '';
            
            result.details.forEach((item, idx) => {
                if (item.isCorrect) correctCount++;
                const qText = (item.question || `Savol ${idx + 1}`).substring(0, 80);
                
                rows += `
                    <tr>
                        <td style="width: 50px; text-align: center;">${idx + 1}</td>
                        <td>${escapeHtml(qText)}${qText.length >= 80 ? '...' : ''}</td>
                        <td style="width: 100px;">
                            <span class="${item.isCorrect ? 'status-correct' : 'status-wrong'}">
                                <i class="fas ${item.isCorrect ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                                ${item.isCorrect ? 'To\'g\'ri' : 'Xato'}
                            </span>
                        </td>
                        <td style="width: 180px;">
                            ${!item.isCorrect ? `<span class="answer-wrong">${escapeHtml(item.userAnswer || 'Javob yo\'q')}</span>` : ''}
                            <span class="answer-correct"><i class="fas fa-check"></i> ${escapeHtml(item.correctAnswer)}</span>
                        </td>
                    </tr>
                `;
            });
            
            return `
                <div class="details-section">
                    <div class="details-header" onclick="toggleDetails()">
                        <div class="details-title">
                            <i class="fas fa-chart-simple"></i> Savollar tahlili
                            <span style="font-size: 13px; font-weight: normal; margin-left: 10px;">
                                <i class="fas fa-check-circle" style="color: #10b981;"></i> ${correctCount} to'g'ri
                                <i class="fas fa-times-circle" style="color: #ef4444; margin-left: 8px;"></i> ${result.details.length - correctCount} xato
                            </span>
                        </div>
                        <i class="fas fa-chevron-down toggle-icon" id="toggle-icon"></i>
                    </div>
                    <div class="details-table-wrapper" id="details-table">
                        <table class="details-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Savol</th>
                                    <th>Holat</th>
                                    <th>Javoblar</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // Toggle funksiyasi (global)
        window.toggleDetails = function() {
            const wrapper = document.getElementById('details-table');
            const icon = document.getElementById('toggle-icon');
            if (wrapper && icon) {
                wrapper.classList.toggle('show');
                icon.classList.toggle('rotated');
            }
        };

        // Asosiy sahifani render qilish
        function renderPage() {
            const params = getUrlParams();
            const { subject, score, total, percent, time } = params;
            const wrong = total - score;
            const grade = getGrade(percent);
            const feedback = getSmartFeedback(percent, subject);
            const latestResult = getLatestResult(subject);
            
            const container = document.getElementById('result-content');
            if (!container) return;
            
            container.innerHTML = `
                <!-- Hero Section with Chart -->
                <div class="hero-section animate-slideUp">
                    <h1 class="hero-title"><i class="fas fa-chart-pie"></i> ${subject}</h1>
                    <p class="hero-subtitle">Test natijalari tahlili</p>
                    
                    <div class="chart-row">
                        <div class="chart-container">
                            <canvas id="result-chart"></canvas>
                        </div>
                        <div class="chart-stats">
                            <p><i class="fas fa-check-circle"></i> <strong>To'g'ri:</strong> ${score} ta</p>
                            <p><i class="fas fa-times-circle"></i> <strong>Xato:</strong> ${wrong} ta</p>
                            <p><i class="fas fa-percent"></i> <strong>To'g'rilik:</strong> ${percent}%</p>
                            <p><i class="fas fa-hourglass-half"></i> <strong>Vaqt:</strong> ${formatTime(time)}</p>
                            <div class="grade-badge grade-${grade.letter}">
                                <i class="fas fa-graduation-cap"></i> Baho: ${grade.text} (${grade.letter})
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card animate-slideUp" style="animation-delay: 0.1s">
                        <div class="stat-icon"><i class="fas fa-question-circle"></i></div>
                        <div class="stat-value">${total}</div>
                        <div class="stat-label">Jami savollar</div>
                    </div>
                    <div class="stat-card animate-slideUp" style="animation-delay: 0.2s">
                        <div class="stat-icon"><i class="fas fa-check-circle" style="color: #10b981;"></i></div>
                        <div class="stat-value" style="color: #10b981;">${score}</div>
                        <div class="stat-label">To'g'ri javoblar</div>
                    </div>
                    <div class="stat-card animate-slideUp" style="animation-delay: 0.3s">
                        <div class="stat-icon"><i class="fas fa-times-circle" style="color: #ef4444;"></i></div>
                        <div class="stat-value" style="color: #ef4444;">${wrong}</div>
                        <div class="stat-label">Xato javoblar</div>
                    </div>
                    <div class="stat-card animate-slideUp" style="animation-delay: 0.4s">
                        <div class="stat-icon"><i class="fas fa-trophy"></i></div>
                        <div class="stat-value">${percent}%</div>
                        <div class="stat-label">Umumiy natija</div>
                    </div>
                </div>
                
                <!-- Feedback Card -->
                <div class="feedback-card ${feedback.type === 'expert' ? 'feedback-expert' : feedback.type === 'good' ? 'feedback-good' : feedback.type === 'average' ? 'feedback-average' : 'feedback-poor'} animate-slideUp" style="animation-delay: 0.5s">
                    <div class="feedback-icon"><i class="fas ${feedback.icon}"></i></div>
                    <div class="feedback-message">${feedback.message}</div>
                    <div class="feedback-advice"><i class="fas fa-lightbulb"></i> ${feedback.advice}</div>
                </div>
                
                <!-- Details Table -->
                ${renderDetailsTable(latestResult, score, total)}
                
                <!-- Action Buttons -->
                <div class="btn-group">
                    <button class="btn btn-primary" id="retake-btn">
                        <i class="fas fa-rotate-right"></i> Qayta topshirish
                    </button>
                    <a href="index.html" class="btn btn-secondary">
                        <i class="fas fa-home"></i> Bosh sahifaga
                    </a>
                </div>
            `;
            
            // Chart yaratish
            setTimeout(() => {
                createChart(score, wrong);
            }, 100);
            
            // Qayta topshirish tugmasi
            const retakeBtn = document.getElementById('retake-btn');
            if (retakeBtn) {
                retakeBtn.addEventListener('click', () => {
                    let subjectIndex = 0;
                    if (window.QUIZ_DATA) {
                        const found = window.QUIZ_DATA.findIndex(s => s.subject === subject);
                        if (found !== -1) subjectIndex = found;
                    }
                    window.location.href = `quiz.html?subject=${subjectIndex}`;
                });
            }
            
            // Jadval toggle ni qayta ulash
            const detailsHeader = document.querySelector('.details-header');
            if (detailsHeader && !detailsHeader.hasAttribute('data-listener')) {
                detailsHeader.setAttribute('data-listener', 'true');
                detailsHeader.onclick = () => toggleDetails();
            }
        }
        
        // Dark Mode
        function initDarkMode() {
            const saved = localStorage.getItem('quiz_theme');
            const isDark = saved === 'dark';
            const themeBtn = document.getElementById('theme-toggle-btn');
            
            if (isDark) {
                document.body.classList.add('dark-mode');
                if (themeBtn) themeBtn.innerHTML = '☀️ Light';
            } else {
                document.body.classList.remove('dark-mode');
                if (themeBtn) themeBtn.innerHTML = '🌙 Dark';
            }
            
            if (themeBtn) {
                themeBtn.addEventListener('click', () => {
                    const nowDark = document.body.classList.contains('dark-mode');
                    if (nowDark) {
                        document.body.classList.remove('dark-mode');
                        localStorage.setItem('quiz_theme', 'light');
                        themeBtn.innerHTML = '🌙 Dark';
                    } else {
                        document.body.classList.add('dark-mode');
                        localStorage.setItem('quiz_theme', 'dark');
                        themeBtn.innerHTML = '☀️ Light';
                    }
                    // Chart ranglarini yangilash
                    if (chartInstance) chartInstance.destroy();
                    const params = getUrlParams();
                    createChart(params.score, params.total - params.score);
                });
            }
        }
        
        // Boshlash
        initDarkMode();
        renderPage();
    })();
</script>
</body>
</html>
