<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test — QuizMaster Pro</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/quiz.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" role="navigation">
    <div class="container">
      <a href="index.html" class="navbar-brand" aria-label="Bosh sahifaga qaytish">
        <div class="brand-icon">Q</div>
        <span>QuizMaster <span class="text-accent">Pro</span></span>
      </a>
      <div class="navbar-actions">
        <button class="theme-toggle" aria-label="Mavzuni almashtirish">🌙</button>
        <button class="btn btn-ghost btn-sm" id="btn-quit" aria-label="Testni to'xtatish">
          ✕ To'xtatish
        </button>
      </div>
    </div>
  </nav>

  <!-- ===== QUIZ CONTAINER ===== -->
  <main class="quiz-page" id="quiz-container" role="main">
    <div class="container">

      <!-- === TOP BAR: Fan nomi + Progress + Timer === -->
      <div class="quiz-topbar animate-fadeInUp">
        <!-- Fan nomi -->
        <div class="quiz-subject-pill">
          <span id="quiz-subject-name" class="quiz-subject-text">Fan</span>
        </div>

        <!-- Progress bar bloki -->
        <div class="quiz-progress-block" role="progressbar" aria-labelledby="quiz-progress-text">
          <div class="progress-meta flex-between">
            <span id="quiz-progress-text" class="text-muted" style="font-size:0.8rem">0% bajarildi</span>
            <span id="quiz-question-counter" class="quiz-counter">1 / 20</span>
          </div>
          <div class="progress-container" style="margin-top:6px">
            <div class="progress-bar" id="quiz-progress-bar" style="width:0%"></div>
          </div>
        </div>

        <!-- Timer -->
        <div class="timer-block" role="timer" aria-live="polite" aria-label="Qolgan vaqt">
          <svg class="timer-svg" viewBox="0 0 52 52" aria-hidden="true">
            <circle class="timer-track" cx="26" cy="26" r="20"/>
            <circle class="timer-ring" id="timer-ring" cx="26" cy="26" r="20"
              style="stroke-dasharray: 125.66; stroke-dashoffset: 0;"
            />
          </svg>
          <span class="timer-text" id="quiz-timer">00:30</span>
        </div>
      </div>

      <!-- === SAVOL KARTOCHKASI === -->
      <article class="question-card card animate-fadeInUp stagger-1" id="question-card" aria-live="polite">
        <div class="question-number-badge" aria-hidden="true" id="question-badge">S–1</div>
        <p class="question-text" id="quiz-question-text">Savol yuklanmoqda...</p>
      </article>

      <!-- === VARIANTLAR === -->
      <div class="options-grid" id="quiz-options" role="group" aria-label="Javob variantlari">
        <!-- quiz.js tomonidan dinamik to'ldiriladi -->
      </div>

      <!-- === PASTKI TUGMALAR === -->
      <div class="quiz-bottom-bar animate-fadeInUp stagger-3">
        <div class="question-dots" id="question-dots" role="navigation" aria-label="Savollar navigatsiyasi">
          <!-- Dinamik yaratiladi -->
        </div>
        <button class="btn btn-primary btn-lg" id="btn-next" disabled aria-label="Keyingi savolga o'tish">
          Keyingisi →
        </button>
      </div>

    </div>
  </main>

  <!-- ===== SCRIPTS ===== -->
  <script src="data/questions.js"></script>
  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
  <script>
    // -------------------------------------------------------
    // Savol raqami badge-ini yangilash
    // -------------------------------------------------------
    document.addEventListener('DOMContentLoaded', () => {
      // Quiz engine ishlayotganda har renderda badge yangilanadi
      const originalRender = window.renderQuestion;

      // Har 500ms da dotlarni yangilash (quiz.js render bo'lgach)
      setInterval(() => {
        if (!window.QuizEngine) return;
        const state = QuizEngine.QuizState;
        if (!state || !state.questions.length) return;

        // Badge yangilash
        const badge = document.getElementById('question-badge');
        if (badge) badge.textContent = `S–${state.currentIndex + 1}`;

        // Dots yaratish (faqat birinchi marta)
        const dots = document.getElementById('question-dots');
        if (dots && dots.children.length !== state.questions.length) {
          dots.innerHTML = '';
          state.questions.forEach((_, i) => {
            const dot = document.createElement('button');
            dot.className = 'q-dot';
            dot.setAttribute('aria-label', `${i + 1}-savol`);
            if (i === state.currentIndex) dot.classList.add('active');
            if (state.answers[i] !== undefined) dot.classList.add('answered');
            dots.appendChild(dot);
          });
        } else if (dots) {
          // Faqat holatini yangilash
          Array.from(dots.children).forEach((dot, i) => {
            dot.classList.toggle('active', i === state.currentIndex);
            dot.classList.toggle('answered', state.answers[i] !== undefined && state.answers[i] !== null);
            dot.classList.toggle('skipped', state.answers[i] === null);
          });
        }
      }, 200);
    });
  </script>
</body>
</html>
