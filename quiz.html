<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizArena — Savol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #263347;
      --border: #2d3f5a;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --accent3: #34d399;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --danger: #f87171;
      --success: #4ade80;
      --wrong: #f87171;
    }

    html, body {
      height: 100%;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    body {
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(56,189,248,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(129,140,248,0.05) 0%, transparent 60%);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      max-width: 900px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--text);
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.15s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    #quizApp {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 48px 80px;
    }

    .error-state {
      text-align: center;
      padding: 80px 24px;
    }

    .error-state .icon {
      font-size: 4rem;
      margin-bottom: 24px;
    }

    .error-state h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--danger);
      margin-bottom: 12px;
    }

    .error-state p {
      color: var(--muted);
      margin-bottom: 28px;
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-outline:hover {
      border-color: var(--accent);
      background: rgba(56,189,248,0.06);
    }

    .quiz-header {
      margin-bottom: 36px;
    }

    .quiz-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .subject-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(56,189,248,0.1);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 50px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
    }

    .timer-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .timer-ring {
      position: relative;
      width: 48px;
      height: 48px;
    }

    .timer-ring svg {
      transform: rotate(-90deg);
    }

    .timer-ring .bg-circle {
      stroke: var(--surface2);
    }

    .timer-ring .progress-circle {
      stroke: var(--accent);
      stroke-dasharray: 126;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }

    .timer-ring .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      color: var(--text);
    }

    .progress-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      transition: width 0.4s ease;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 40px;
      margin-bottom: 24px;
      animation: cardIn 0.3s ease;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .question-number {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .question-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      color: var(--text);
      line-height: 1.4;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .option-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      cursor: pointer;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.18s, background 0.18s, transform 0.15s;
      position: relative;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(56,189,248,0.06);
      transform: translateY(-2px);
    }

    .option-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-letter {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--muted);
      flex-shrink: 0;
      transition: background 0.18s, color 0.18s;
    }

    .option-btn.correct {
      border-color: var(--success);
      background: rgba(74,222,128,0.08);
    }

    .option-btn.correct .option-letter {
      background: var(--success);
      color: #0f172a;
    }

    .option-btn.wrong {
      border-color: var(--wrong);
      background: rgba(248,113,113,0.08);
    }

    .option-btn.wrong .option-letter {
      background: var(--wrong);
      color: #0f172a;
    }

    .timeout-overlay {
      display: none;
      text-align: center;
      padding: 60px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      animation: cardIn 0.35s ease;
    }

    .timeout-overlay.active {
      display: block;
    }

    .timeout-overlay .big-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .timeout-overlay h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--danger);
      margin-bottom: 10px;
    }

    .timeout-overlay p {
      color: var(--muted);
      margin-bottom: 32px;
      font-size: 0.9rem;
    }

    .btn-restart {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0f172a;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-restart:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .result-screen {
      display: none;
      text-align: center;
      animation: cardIn 0.4s ease;
    }

    .result-screen.active {
      display: block;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 40px;
      max-width: 520px;
      margin: 0 auto;
    }

    .result-emoji {
      font-size: 5rem;
      margin-bottom: 24px;
      display: block;
    }

    .result-card h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      color: var(--text);
      margin-bottom: 12px;
    }

    .score-display {
      margin: 32px 0;
      background: var(--surface2);
      border-radius: 16px;
      padding: 24px;
    }

    .score-fraction {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 3.5rem;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
    }

    .score-label {
      font-size: 0.875rem;
      color: var(--muted);
    }

    .score-bar-wrap {
      margin: 20px 0 0;
    }

    .score-bar-track {
      height: 10px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      transition: width 1s cubic-bezier(0.34,1.56,0.64,1);
    }

    .result-message {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .result-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 24px;
      font-size: 0.9rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-home:hover {
      border-color: var(--accent);
      background: rgba(56,189,248,0.06);
    }

    @media (max-width: 768px) {
      header { padding: 18px 24px; }
      #quizApp { padding: 28px 20px 60px; }
      .question-card { padding: 24px 22px; }
      .options-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">Quiz<span>Arena</span></a>
    <a class="back-link" href="index.html">← Orqaga</a>
  </header>

  <div id="quizApp"></div>

  <script src="questions.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
