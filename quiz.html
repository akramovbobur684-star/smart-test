<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <title>QuizMaster Pro — Blitz Test</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts (Dashboard bilan bir xil) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <!-- ========== DARK MODE SINXRON (Dashboarddan) ========== -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('quiz_theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
                document.body.classList.add('dark-mode');
            } else if (savedTheme === 'light') {
                document.documentElement.classList.remove('dark-mode');
                document.body.classList.remove('dark-mode');
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark-mode');
                document.body.classList.add('dark-mode');
            }
        })();
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #ffffff;
            --bg-secondary: #f3f4f6;
            --bg-tertiary: #e5e7eb;
            --text: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --card-bg: #ffffff;
            --card-border: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --card-bg: #1e293b;
            --card-border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background var(--transition-base), color var(--transition-base);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== ASOSIY KONTEYNER ========== */
        .quiz-wrapper {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* ========== HEADER ========== */
        .quiz-header {
            padding: 0 0 20px 0;
            margin-bottom: 20px;
        }

        .quiz-logo {
            font-size: 26px;
            font-weight: 800;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }

        .brand-icon {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            font-weight: bold;
            font-size: 20px;
            color: white;
        }

        /* ========== FAN VA SAVOL RAQAMI ========== */
        .quiz-info {
            text-align: center;
            margin-bottom: 24px;
        }

        .subject-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .question-counter {
            font-size: 14px;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            display: inline-block;
            padding: 5px 16px;
            border-radius: 40px;
            font-weight: 500;
        }

        /* ========== TIMER PROGRESS ========== */
        .timer-section {
            margin-bottom: 28px;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .progress-fill.danger {
            background: var(--danger);
        }

        .timer-text {
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .timer-text.warning {
            color: var(--danger);
            font-weight: 700;
        }

        /* ========== SAVOL MATNI ========== */
        .question-text {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.45;
            margin-bottom: 28px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 24px;
            border-left: 5px solid var(--primary);
        }

        /* ========== VARIANTLAR ========== */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 32px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 18px;
            cursor: pointer;
            transition: var(--transition-base);
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
            width: 100%;
            text-align: left;
        }

        .option-btn:hover {
            transform: translateX(8px);
            border-color: var(--primary);
        }

        .option-btn.selected {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .option-letter {
            font-weight: 800;
            font-size: 18px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border-radius: 50%;
            transition: var(--transition-base);
        }

        .option-btn.selected .option-letter {
            background: white;
            color: var(--primary);
        }

        .option-text {
            flex: 1;
            line-height: 1.4;
        }

        /* ========== NEXT TUGMASI ========== */
        .next-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-base);
            margin-top: 8px;
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .next-btn:not(:disabled):hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* ========== SKELETON LOADING ========== */
        .skeleton-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .skeleton-header {
            height: 60px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            animation: shimmer 1.5s infinite;
        }

        .skeleton-text {
            height: 100px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            animation: shimmer 1.5s infinite;
        }

        .skeleton-option {
            height: 65px;
            background: var(--bg-tertiary);
            border-radius: 18px;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* ========== TIME OVER OVERLAY ========== */
        .time-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease-out;
        }

        .time-overlay-content {
            text-align: center;
            background: var(--card-bg);
            padding: 40px 32px;
            border-radius: 32px;
            max-width: 340px;
            width: 85%;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--card-border);
        }

        .time-overlay-icon {
            font-size: 70px;
            color: var(--danger);
            margin-bottom: 20px;
        }

        .time-overlay-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--danger);
        }

        .time-overlay-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .reset-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 14px 36px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition-base);
        }

        .reset-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* ========== ERROR STATE ========== */
        .error-container {
            text-align: center;
            padding: 50px 20px;
            background: var(--bg-secondary);
            border-radius: 28px;
            border: 1px solid var(--card-border);
        }

        .error-icon {
            font-size: 60px;
            color: var(--danger);
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--danger);
        }

        .error-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .error-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            z-index: 10001;
            animation: slideUp 0.3s ease-out;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            box-shadow: var(--shadow-lg);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 550px) {
            .quiz-wrapper { padding: 20px 16px; }
            .quiz-logo { font-size: 22px; }
            .brand-icon { width: 38px; height: 38px; font-size: 18px; }
            .subject-name { font-size: 19px; }
            .question-text { font-size: 17px; padding: 16px; }
            .option-btn { padding: 14px 16px; font-size: 14px; gap: 12px; }
            .option-letter { width: 32px; height: 32px; font-size: 16px; }
            .next-btn { padding: 15px; font-size: 16px; }
            .time-overlay-content { padding: 30px 24px; }
            .time-overlay-icon { font-size: 55px; }
            .time-overlay-title { font-size: 22px; }
        }
    </style>
</head>

<!-- 1️⃣ BIRINCHI: Ma'lumotlar bazasi -->
<script src="questions.js"></script>

<!-- 2️⃣ KEYIN: Quiz Engine -->
<script>
// ============================================================
// quiz.js v4.0 - FINAL FIXED VERSION (Path Correction + Global Sync)
// ============================================================

(function() {
    'use strict';

    // ========== KONFIGURATSIYA ==========
    const TIME_PER_QUESTION = 15;
    const TOTAL_QUESTIONS = 25;
    const DATA_WAIT_TIMEOUT = 2000; // 2 soniya kutish

    // ========== STATE ==========
    let state = {
        subjectIndex: null,
        subjectName: "",
        allQuestions: [],
        selectedQuestions: [],
        currentIndex: 0,
        answers: [],
        timeLeft: TIME_PER_QUESTION,
        timerInterval: null,
        isFinished: false,
        isTimeOver: false,
        startTime: null,
        isAnswered: false,
        dataReady: false
    };

    // DOM elementlari
    let elements = {};

    // ========== YORDAMCHI FUNKSIYALAR ==========
    function shuffleArray(arr) {
        const array = [...arr];
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function getUrlParam(param) {
        const params = new URLSearchParams(window.location.search);
        return params.get(param);
    }

    function showToast(message, type = 'info') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        const colors = { success: '#10b981', error: '#ef4444', warning: '#f59e0b', info: '#4f46e5' };
        toast.style.backgroundColor = colors[type];
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.remove(), 2500);
    }

    function clearTimer() {
        if (state.timerInterval) {
            clearInterval(state.timerInterval);
            state.timerInterval = null;
        }
    }

    // ========== UI ELEMENTLARNI YANGILASH ==========
    function initElements() {
        elements = {
            subjectName: document.getElementById('quiz-subject-name'),
            counter: document.getElementById('quiz-question-counter'),
            questionText: document.getElementById('quiz-question-text'),
            options: document.getElementById('quiz-options'),
            nextBtn: document.getElementById('btn-next'),
            progressFill: document.getElementById('timer-progress-fill'),
            timerText: document.getElementById('timer-text'),
            timeOverlay: document.getElementById('time-overlay'),
            resetBtn: document.getElementById('reset-test-btn'),
            skeletonLoading: document.getElementById('skeleton-loading'),
            quizContent: document.getElementById('quiz-content')
        };
    }

    // ========== TIME OVER OVERLAY ==========
    function showTimeOverlay() {
        clearTimer();
        state.isTimeOver = true;
        state.isFinished = true;
        
        if (elements.timeOverlay) {
            elements.timeOverlay.style.display = 'flex';
        }
    }

    function hideTimeOverlay() {
        if (elements.timeOverlay) {
            elements.timeOverlay.style.display = 'none';
        }
    }

    function resetAndRestart() {
        hideTimeOverlay();
        state.isFinished = false;
        state.isTimeOver = false;
        state.currentIndex = 0;
        state.answers = [];
        state.isAnswered = false;
        
        // Yangi random savollar tanlash
        state.selectedQuestions = selectRandomQuestions(state.allQuestions);
        state.answers = new Array(TOTAL_QUESTIONS).fill(undefined);
        state.startTime = Date.now();
        
        renderQuestion();
        showToast("⚡ Test qayta boshlandi! Har bir savolga 15 soniya", 'success');
    }

    // ========== TAYMER ==========
    function startTimer() {
        clearTimer();
        state.timeLeft = TIME_PER_QUESTION;
        updateTimerUI();
        
        state.timerInterval = setInterval(() => {
            if (state.isFinished || state.isTimeOver) {
                clearTimer();
                return;
            }
            
            if (!state.isAnswered) {
                state.timeLeft--;
                updateTimerUI();
                
                if (state.timeLeft <= 0) {
                    clearTimer();
                    showTimeOverlay();
                }
            }
        }, 1000);
    }

    function updateTimerUI() {
        const percent = Math.max(0, (state.timeLeft / TIME_PER_QUESTION) * 100);
        
        if (elements.progressFill) {
            elements.progressFill.style.width = `${percent}%`;
            
            if (percent < 30) {
                elements.progressFill.classList.add('danger');
            } else {
                elements.progressFill.classList.remove('danger');
            }
        }
        
        if (elements.timerText) {
            elements.timerText.innerHTML = `${state.timeLeft} soniya qoldi`;
            if (state.timeLeft <= 5) {
                elements.timerText.classList.add('warning');
            } else {
                elements.timerText.classList.remove('warning');
            }
        }
    }

    // ========== SAVOLLARNI TANLASH ==========
    function selectRandomQuestions(allQuestions) {
        if (!allQuestions || allQuestions.length === 0) return [];
        const shuffled = shuffleArray(allQuestions);
        return shuffled.slice(0, Math.min(TOTAL_QUESTIONS, shuffled.length));
    }

    // ========== SAVOLNI RENDER QILISH ==========
    function renderQuestion() {
        if (!state.selectedQuestions.length || state.isFinished) return;
        
        const q = state.selectedQuestions[state.currentIndex];
        const current = state.currentIndex + 1;
        
        if (elements.subjectName && state.subjectName) {
            elements.subjectName.innerHTML = state.subjectName;
        }
        
        if (elements.counter) {
            elements.counter.innerHTML = `${current} / ${TOTAL_QUESTIONS}`;
        }
        
        if (elements.questionText) {
            elements.questionText.innerHTML = escapeHtml(q.question);
        }
        
        if (elements.options) {
            elements.options.innerHTML = '';
            state.isAnswered = false;
            
            q.options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `
                    <span class="option-letter">${letter}</span>
                    <span class="option-text">${escapeHtml(opt)}</span>
                `;
                
                btn.onclick = () => {
                    if (state.isFinished || state.isTimeOver || state.isAnswered) return;
                    
                    state.answers[state.currentIndex] = opt;
                    state.isAnswered = true;
                    
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    
                    if (elements.nextBtn) {
                        elements.nextBtn.disabled = false;
                    }
                    
                    showToast("✅ Javob qabul qilindi!", 'success');
                };
                
                elements.options.appendChild(btn);
            });
        }
        
        if (elements.nextBtn) {
            elements.nextBtn.disabled = true;
            const isLast = state.currentIndex === TOTAL_QUESTIONS - 1;
            elements.nextBtn.innerHTML = isLast ? '✅ Natijani ko\'rish' : '▶ Keyingi savol';
        }
        
        startTimer();
    }

    // ========== KEYINGI SAVOL ==========
    function nextQuestion() {
        if (state.isFinished || state.isTimeOver) return;
        
        if (!state.isAnswered) {
            showToast("⚠️ Iltimos, javob tanlang!", 'warning');
            return;
        }
        
        clearTimer();
        
        if (state.currentIndex < TOTAL_QUESTIONS - 1) {
            state.currentIndex++;
            renderQuestion();
        } else {
            finishQuiz();
        }
    }

    // ========== TESTNI YAKUNLASH ==========
    function finishQuiz() {
        if (state.isFinished) return;
        
        clearTimer();
        state.isFinished = true;
        
        let correct = 0;
        const details = [];
        
        for (let i = 0; i < state.selectedQuestions.length; i++) {
            const q = state.selectedQuestions[i];
            const userAnswer = state.answers[i];
            const isCorrect = userAnswer === q.answer;
            if (isCorrect) correct++;
            
            details.push({
                question: q.question,
                userAnswer: userAnswer || "Javob berilmadi",
                correctAnswer: q.answer,
                isCorrect: isCorrect
            });
        }
        
        const percent = Math.round((correct / TOTAL_QUESTIONS) * 100);
        const timeSpent = Math.round((Date.now() - state.startTime) / 1000);
        
        const result = {
            subject: state.subjectName,
            subjectIndex: state.subjectIndex,
            correct: correct,
            total: TOTAL_QUESTIONS,
            percent: percent,
            timeSpent: timeSpent,
            details: details,
            timestamp: Date.now()
        };
        
        // Natijani saqlash
        try {
            const results = JSON.parse(localStorage.getItem('qm_results') || '[]');
            results.unshift(result);
            while (results.length > 50) results.pop();
            localStorage.setItem('qm_results', JSON.stringify(results));
        } catch(e) {}
        
        // Natija sahifasiga o'tish
        const params = new URLSearchParams({
            subject: result.subject,
            score: result.correct,
            total: result.total,
            percent: result.percent,
            time: result.timeSpent
        });
        
        window.location.href = `result.html?${params.toString()}`;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ========== MA'LUMOTLARNI KUTISH FUNKSIYASI ==========
    function waitForData(callback) {
        let attempts = 0;
        const maxAttempts = DATA_WAIT_TIMEOUT / 100; // 20 marta (2 soniya)
        
        console.log('[Quiz] Ma\'lumotlarni kutish boshlandi...');
        
        const checkInterval = setInterval(() => {
            attempts++;
            
            if (window.QUIZ_DATA && window.QUIZ_DATA.length > 0) {
                console.log('[Quiz] ✅ Ma\'lumotlar topildi!', window.QUIZ_DATA.length, 'ta fan');
                clearInterval(checkInterval);
                callback(true);
            } else if (attempts >= maxAttempts) {
                console.error('[Quiz] ❌ Ma\'lumotlar topilmadi!', attempts, 'urinish');
                clearInterval(checkInterval);
                callback(false);
            } else if (attempts % 5 === 0) {
                console.log('[Quiz] Kutilmoqda...', attempts, '/', maxAttempts);
            }
        }, 100);
    }

    // ========== XATO KO'RSATISH ==========
    function showError(title, message) {
        if (elements.skeletonLoading) elements.skeletonLoading.style.display = 'none';
        if (elements.quizContent) elements.quizContent.style.display = 'none';
        
        const wrapper = document.getElementById('quiz-wrapper');
        if (wrapper) {
            wrapper.innerHTML = `
                <div class="error-container">
                    <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="error-title">${escapeHtml(title)}</div>
                    <div class="error-text">${escapeHtml(message)}</div>
                    <a href="index.html" class="error-btn"><i class="fas fa-home"></i> Bosh sahifaga</a>
                </div>
            `;
        }
        console.error('[Quiz] Xato:', title, message);
    }

    // ========== ASOSIY INIT FUNKSIYASI ==========
    function initQuiz() {
        initElements();
        
        const subjectParam = getUrlParam('subject');
        console.log('[Quiz] URL subject param:', subjectParam);
        
        if (subjectParam === null) {
            showError("URL xatosi", "URL da 'subject' parametri topilmadi!\nMisol: quiz.html?subject=0");
            return;
        }
        
        const idx = parseInt(subjectParam);
        if (isNaN(idx)) {
            showError(`Parametr xatosi`, `'subject' parametri son emas: ${subjectParam}\n0 dan 4 gacha bo'lgan son kiriting`);
            return;
        }
        
        // Ma'lumotlarni kutish
        waitForData((isReady) => {
            if (!isReady) {
                showError("Ma'lumotlar bazasi topilmadi!", 
                    "questions.js fayli yuklanmagan yoki bo'sh.\n\nSabablari:\n• Internet aloqangizni tekshiring\n• Sahifani qayta yuklang\n• Agar muammo davom etsa, F12 tugmasini bosing va konsolni tekshiring");
                return;
            }
            
            console.log('[Quiz] window.QUIZ_DATA uzunligi:', window.QUIZ_DATA.length);
            
            if (idx >= window.QUIZ_DATA.length) {
                showError(`Fan topilmadi (${idx})`, `Mavjud fanlar: 0 dan ${window.QUIZ_DATA.length - 1} gacha\nTanlangan indeks: ${idx}`);
                return;
            }
            
            const subject = window.QUIZ_DATA[idx];
            if (!subject || !subject.questions || subject.questions.length === 0) {
                showError(`Savollar topilmadi`, `${subject ? subject.subject : 'Fan'} da savollar mavjud emas!\nMa'lumotlar bazasini tekshiring`);
                return;
            }
            
            console.log('[Quiz] Fan topildi:', subject.subject);
            console.log('[Quiz] Jami savollar soni:', subject.questions.length);
            
            state.subjectIndex = idx;
            state.subjectName = subject.subject;
            state.allQuestions = subject.questions;
            
            // RANDOM 25 savol tanlash
            state.selectedQuestions = selectRandomQuestions(state.allQuestions);
            state.currentIndex = 0;
            state.answers = new Array(TOTAL_QUESTIONS).fill(undefined);
            state.isFinished = false;
            state.isTimeOver = false;
            state.isAnswered = false;
            state.startTime = Date.now();
            state.dataReady = true;
            
            document.title = `${subject.subject} — Blitz Test`;
            
            // Skeletorni yashirib, asosiy kontentni ko'rsatish
            if (elements.skeletonLoading) elements.skeletonLoading.style.display = 'none';
            if (elements.quizContent) elements.quizContent.style.display = 'block';
            
            renderQuestion();
            showToast(`⚡ ${subject.subject} testi boshlandi! Har bir savolga 15 soniya`, 'success');
        });
    }

    // ========== EVENT LISTENERLAR ==========
    function bindEvents() {
        if (elements.nextBtn) {
            elements.nextBtn.addEventListener('click', nextQuestion);
        }
        
        if (elements.resetBtn) {
            elements.resetBtn.addEventListener('click', resetAndRestart);
        }
    }

    // ========== BOSHLASH ==========
    function start() {
        bindEvents();
        initQuiz();
    }
    
    // Sahifa yuklanganda boshlash
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start);
    } else {
        start();
    }
})();
</script>
