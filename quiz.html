<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test — QuizMaster Pro</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/quiz.css" />
  <style>
    /* Sahifaga xos qo'shimcha uslublar */
    .q-dot { 
        width: 12px; height: 12px; border-radius: 50%; 
        border: none; background: var(--border-color, #ccc); 
        cursor: pointer; transition: all 0.3s ease; 
        padding: 0; margin: 0 4px;
    }
    .q-dot.active { transform: scale(1.4); background: var(--accent, #6C63FF) !important; box-shadow: 0 0 10px var(--accent); }
    .q-dot.answered { background: #10b981; }
    .q-dot.skipped { background: #f59e0b; }
    .timer-ring { transition: stroke-dashoffset 0.3s linear, stroke 0.3s ease; }
    .progress-bar { height: 100%; background: var(--accent, #6C63FF); border-radius: var(--radius-full); transition: width 0.4s ease; }
    .progress-container { width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
  </style>
</head>
<body class="quiz-body-context">

  <nav class="navbar" role="navigation">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0;">
      <a href="index.html" class="navbar-brand" aria-label="Bosh sahifaga qaytish">
        <div class="brand-icon" style="background: #6C63FF; color: white; padding: 5px 12px; border-radius: 8px;">Q</div>
        <span style="font-weight: bold; margin-left: 10px;">QuizMaster <span class="text-accent" style="color:#6C63FF">Pro</span></span>
      </a>
      <div class="navbar-actions" style="display: flex; gap: 15px; align-items: center;">
        <button class="theme-toggle" id="theme-btn" style="background:none; border:1px solid #ccc; border-radius: 50%; cursor:pointer; padding: 5px 8px;">🌙</button>
        <button class="btn btn-ghost btn-sm" id="btn-quit" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 600;">
          ✕ To'xtatish
        </button>
      </div>
    </div>
  </nav>

  <main class="quiz-page" id="quiz-container" role="main">
    <div class="container" style="max-width: 800px; margin: 0 auto; padding: 20px;">

      <div class="quiz-topbar animate-fadeInUp" style="display: grid; grid-template-columns: auto 1fr auto; gap: 25px; align-items: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px;">
        
        <div class="quiz-subject-pill" style="background: rgba(108, 99, 255, 0.1); padding: 8px 16px; border-radius: 20px;">
          <span id="quiz-subject-name" class="quiz-subject-text" style="color: #6C63FF; font-weight: 700;">Yuklanmoqda...</span>
        </div>

        <div class="quiz-progress-block" role="progressbar">
          <div class="progress-meta flex-between" style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span id="quiz-progress-text" style="font-size: 0.8rem; color: #64748b;">0% bajarildi</span>
            <span id="quiz-question-counter" class="quiz-counter" style="font-weight: bold; font-size: 0.9rem;">1 / 20</span>
          </div>
          <div class="progress-container">
            <div class="progress-bar" id="quiz-progress-bar" style="width:0%"></div>
          </div>
        </div>

        <div class="timer-block" style="position: relative; width: 60px; height: 60px;">
          <svg class="timer-svg" viewBox="0 0 52 52" style="transform: rotate(-90deg); width: 100%; height: 100%;">
            <circle class="timer-track" cx="26" cy="26" r="20" stroke="#e2e8f0" stroke-width="4" fill="none"/>
            <circle class="timer-ring" id="timer-ring" cx="26" cy="26" r="20" stroke="#6C63FF" stroke-width="4" fill="none"
              style="stroke-dasharray: 125.66; stroke-dashoffset: 0;"
            />
          </svg>
          <span class="timer-text" id="quiz-timer" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 0.8rem;">00:30</span>
        </div>
      </div>

      <article class="question-card card animate-fadeInUp" id="question-card" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative;">
        <div class="question-number-badge" id="question-badge" style="position: absolute; top: -15px; left: 30px; background: #6C63FF; color: white; padding: 5px 15px; border-radius: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(108,99,255,0.3);">S–1</div>
        <p class="question-text" id="quiz-question-text" style="font-size: 1.3rem; font-weight: 600; line-height: 1.5; color: #1e293b;">Savol yuklanmoqda...</p>
      </article>

      <div class="options-grid" id="quiz-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
        </div>

      <div class="quiz-bottom-bar animate-fadeInUp" style="display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <div class="question-dots" id="question-dots" style="display: flex; gap: 5px;">
          </div>
        <button class="btn btn-primary btn-lg" id="btn-next" disabled style="background: #6C63FF; color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;">
          Keyingisi →
        </button>
      </div>

    </div>
  </main>

  <script src="data/questions.js"></script>
  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Mavzuni boshqarish
      const themeBtn = document.getElementById('theme-btn');
      themeBtn.addEventListener('click', () => {
        if (window.QuizApp) window.QuizApp.toggleTheme();
      });

      // 2. Testdan chiqishni tasdiqlash
      const quitBtn = document.getElementById('btn-quit');
      quitBtn.addEventListener('click', () => {
        if (confirm("Haqiqatdan ham testni to'xtatmoqchimisiz? Natijalar saqlanmaydi.")) {
          window.location.href = 'index.html';
        }
      });

      // 3. Davomiy yangilanishlar (Badge, Dots, Progress)
      const updateUI = () => {
        if (!window.QuizEngine || !QuizEngine.QuizState) return;
        
        const state = QuizEngine.QuizState;
        const total = state.questions.length;
        const current = state.currentIndex;

        // Badge va Counter
        document.getElementById('question-badge').textContent = `S–${current + 1}`;
        document.getElementById('quiz-question-counter').textContent = `${current + 1} / ${total}`;
        
        // Progress Bar
        const percent = Math.round(((current) / total) * 100);
        document.getElementById('quiz-progress-bar').style.width = `${percent}%`;
        document.getElementById('quiz-progress-text').textContent = `${percent}% bajarildi`;

        // Dots (Nuqtalar) navigatsiyasi
        const dotsContainer = document.getElementById('question-dots');
        if (dotsContainer.children.length !== total) {
          dotsContainer.innerHTML = '';
          for (let i = 0; i < total; i++) {
            const dot = document.createElement('div');
            dot.className = 'q-dot';
            dotsContainer.appendChild(dot);
          }
        }

        Array.from(dotsContainer.children).forEach((dot, i) => {
          dot.classList.toggle('active', i === current);
          dot.classList.toggle('answered', state.answers[i] !== undefined && state.answers[i] !== null);
          dot.classList.toggle('skipped', state.answers[i] === null);
        });
      };

      // UI ni yangilab turish
      setInterval(updateUI, 200);

      // Sahifani tark etishda ogohlantirish (Refresh yoki Yopishda)
      window.onbeforeunload = () => "Test jarayoni ketmoqda. Chiqib ketsangiz natijalar yo'qoladi.";
    });
  </script>
</body>
</html>
