<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test | Quiz Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        .subject-title {
            color: #bb86fc;
            font-size: 1.8rem;
        }
        .timer-box {
            background: #2c2c2c;
            padding: 10px 18px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffb74d;
        }
        .question-area {
            margin: 25px 0;
        }
        .question-text {
            font-size: 1.4rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        .option {
            background: #2d2d2d;
            padding: 14px 18px;
            border-radius: 16px;
            cursor: pointer;
            border: 1px solid #3d3d3d;
            transition: 0.1s linear;
        }
        .option:hover {
            background: #3a3a3a;
            border-color: #bb86fc;
        }
        .option.selected {
            background: #3700b3;
            border-color: #bb86fc;
        }
        .explanation-box {
            background: #0f0f1f;
            border-left: 4px solid #bb86fc;
            padding: 15px;
            border-radius: 14px;
            margin: 15px 0;
            font-size: 0.95rem;
            color: #c0c0ff;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
        }
        button {
            background: #333;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            color: white;
            transition: 0.1s;
        }
        button:hover {
            background: #555;
        }
        .next-btn {
            background: #bb86fc;
            color: #000;
        }
        .next-btn:hover {
            background: #9b6bdc;
        }
        .result-area {
            text-align: center;
            padding: 30px;
        }
        .restart-btn {
            background: #bb86fc;
            margin-top: 20px;
            display: inline-block;
        }
        .progress {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #aaa;
        }
        @media (max-width: 600px) {
            .quiz-container { padding: 20px; }
            .question-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quizRoot">
    <div class="loader" style="text-align:center; padding:50px;">⏳ Yuklanmoqda...</div>
</div>

<script src="questions.js?v=2.0"></script>
<script>
(function(){
    let currentSubjectId = null;
    let quizData = null;
    let questionsArray = [];
    let currentIndex = 0;
    let userAnswers = [];
    let timeLeft = 15;
    let timerInterval = null;
    let selectedOptionIndex = null;
    let showExplanation = false;

    const urlParams = new URLSearchParams(window.location.search);
    currentSubjectId = urlParams.get('subject');

    function stopTimer() {
        if(timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTimer() {
        if(timerInterval) stopTimer();
        timerInterval = setInterval(() => {
            if(timeLeft <= 1) {
                if(timeLeft === 1) {
                    timeLeft = 0;
                    updateTimerDisplay();
                    stopTimer();
                    handleTimeout();
                } else {
                    timeLeft--;
                    updateTimerDisplay();
                }
            } else {
                timeLeft--;
                updateTimerDisplay();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const timerSpan = document.getElementById('timerValue');
        if(timerSpan) timerSpan.innerText = timeLeft;
    }

    function handleTimeout() {
        if(!questionsArray.length) return;
        if(userAnswers[currentIndex] !== undefined) return;
        userAnswers[currentIndex] = null;
        showExplanation = true;
        selectedOptionIndex = null;
        renderCurrentQuestion();
    }

    function saveAnswer(optIndex) {
        if(userAnswers[currentIndex] !== undefined) return;
        if(showExplanation) return;
        selectedOptionIndex = optIndex;
        const isCorrect = (optIndex === questionsArray[currentIndex].correct);
        userAnswers[currentIndex] = optIndex;
        showExplanation = true;
        stopTimer();
        renderCurrentQuestion();
    }

    function nextQuestion() {
        if(currentIndex + 1 < questionsArray.length) {
            currentIndex++;
            resetForNewQuestion();
        } else {
            finishQuiz();
        }
    }

    function resetForNewQuestion() {
        stopTimer();
        if(userAnswers[currentIndex] === undefined) {
            timeLeft = 15;
        } else {
            timeLeft = 15;
        }
        selectedOptionIndex = null;
        showExplanation = false;
        startTimer();
        renderCurrentQuestion();
    }

    function renderCurrentQuestion() {
        if(!questionsArray.length) return;
        const q = questionsArray[currentIndex];
        const isAnswered = (userAnswers[currentIndex] !== undefined);
        const chosenIdx = userAnswers[currentIndex];
        const correctIdx = q.correct;

        let optionsHtml = '';
        for(let i = 0; i < q.options.length; i++) {
            let additionalClass = '';
            let marker = '';
            if(isAnswered && showExplanation) {
                if(i === correctIdx) {
                    additionalClass = 'style="background:#1f3b1f; border-color:#4caf50;"';
                    marker = ' ✅';
                } else if(i === chosenIdx && chosenIdx !== correctIdx) {
                    additionalClass = 'style="background:#5a1e1e; border-color:#cf6679;"';
                    marker = ' ❌';
                } else {
                    additionalClass = '';
                }
            } else if(selectedOptionIndex === i && !isAnswered) {
                additionalClass = 'class="option selected"';
            } else {
                additionalClass = 'class="option"';
            }
            optionsHtml += `<div ${additionalClass} data-opt-index="${i}">${String.fromCharCode(65+i)}. ${q.options[i]}${marker}</div>`;
        }

        let explanationHtml = '';
        if(isAnswered && showExplanation && q.explanation) {
            explanationHtml = `<div class="explanation-box">📘 Izoh: ${q.explanation}</div>`;
        } else if(isAnswered && showExplanation && !q.explanation) {
            explanationHtml = `<div class="explanation-box">ℹ️ Izoh mavjud emas.</div>`;
        }

        let nextButtonHtml = '';
        if(isAnswered && showExplanation) {
            if(currentIndex + 1 < questionsArray.length) {
                nextButtonHtml = `<button class="next-btn" id="nextBtn">➡ Keyingi savol</button>`;
            } else {
                nextButtonHtml = `<button class="next-btn" id="nextBtn">🏁 Yakunlash</button>`;
            }
        } else {
            nextButtonHtml = `<button id="nextBtn" disabled style="opacity:0.5;">⏩ Avval javob bering</button>`;
        }

        const progressText = `${currentIndex+1} / ${questionsArray.length}`;
        const html = `
            <div class="header">
                <div class="subject-title">📚 ${quizData.title}</div>
                <div class="timer-box">⏱️ <span id="timerValue">${timeLeft}</span> soniya</div>
            </div>
            <div class="question-area">
                <div class="question-text">${q.text}</div>
                <div class="options-list" id="optionsList">
                    ${optionsHtml}
                </div>
                ${explanationHtml}
            </div>
            <div class="nav-buttons">
                <button id="prevBtn" ${currentIndex === 0 ? 'disabled style="opacity:0.5;"' : ''}>◀ Oldingi</button>
                ${nextButtonHtml}
            </div>
            <div class="progress">Savol ${progressText}</div>
        `;
        document.getElementById('quizRoot').innerHTML = html;
        updateTimerDisplay();

        if(!isAnswered && !showExplanation) {
            const optDivs = document.querySelectorAll('.option');
            optDivs.forEach(div => {
                const idx = parseInt(div.getAttribute('data-opt-index'));
                div.addEventListener('click', () => saveAnswer(idx));
            });
        }

        const nextBtn = document.getElementById('nextBtn');
        if(nextBtn && !nextBtn.disabled) {
            nextBtn.addEventListener('click', () => nextQuestion());
        }
        const prevBtn = document.getElementById('prevBtn');
        if(prevBtn && currentIndex > 0) {
            prevBtn.addEventListener('click', () => {
                if(currentIndex > 0) {
                    currentIndex--;
                    resetForNewQuestion();
                }
            });
        }
    }

    function finishQuiz() {
        stopTimer();
        let correctCount = 0;
        for(let i = 0; i < questionsArray.length; i++) {
            if(userAnswers[i] !== null && userAnswers[i] === questionsArray[i].correct) {
                correctCount++;
            }
        }
        const percent = Math.round((correctCount / questionsArray.length)*100);
        let resultHtml = `
            <div class="result-area">
                <h2>🎯 Test yakunlandi!</h2>
                <p style="font-size:2rem; margin:20px;">${correctCount} / ${questionsArray.length}</p>
                <p>Foiz: ${percent}%</p>
                <button class="restart-btn" id="restartQuiz">🔄 Qayta boshlash</button>
                <button id="goDashboard" style="margin-left:15px;">🏠 Dashboard</button>
            </div>
        `;
        document.getElementById('quizRoot').innerHTML = resultHtml;
        document.getElementById('restartQuiz').addEventListener('click', () => {
            window.location.reload();
        });
        document.getElementById('goDashboard').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    }

    function shuffleArray(arr) {
        for(let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initQuiz() {
        if(!window.QUIZ_DATA || !window.QUIZ_DATA[currentSubjectId]) {
            document.getElementById('quizRoot').innerHTML = `<div class="error" style="text-align:center;padding:40px;">❌ Fan topilmadi. ID: ${currentSubjectId}<br><button onclick="location.href='index.html'">Orqaga</button></div>`;
            return;
        }
        quizData = window.QUIZ_DATA[currentSubjectId];
        if(!quizData.questions || quizData.questions.length === 0) {
            document.getElementById('quizRoot').innerHTML = `<div class="error">⚠️ Bu fanda savollar mavjud emas.</div>`;
            return;
        }
        questionsArray = shuffleArray([...quizData.questions]);
        userAnswers = new Array(questionsArray.length);
        for(let i=0; i<userAnswers.length; i++) userAnswers[i] = undefined;
        currentIndex = 0;
        timeLeft = 15;
        selectedOptionIndex = null;
        showExplanation = false;
        startTimer();
        renderCurrentQuestion();
    }

    const waitForDB = setInterval(() => {
        if(window.QUIZ_DATA && typeof window.QUIZ_DATA === 'object') {
            clearInterval(waitForDB);
            initQuiz();
        } else {
            document.getElementById('quizRoot').innerHTML = '<div class="loader" style="text-align:center;">⏳ Ma\'lumotlar bazasi yuklanmoqda...</div>';
        }
    }, 200);
})();
</script>
</body>
</html>
