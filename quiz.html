<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster Pro — Test</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Qo'shimcha stillar */
        .error-box { text-align: center; padding: 60px 20px; }
        .error-box h2 { color: #ff4757; }
    </style>
</head>
<body>
    <div class="quiz-wrapper">
        <div class="quiz-header">
            <h1>📝 QuizMaster <span>Pro</span></h1>
            <div class="quiz-timer" id="quiz-timer-display">
                <svg width="60" height="60">
                    <circle cx="30" cy="30" r="20" fill="none" stroke="#e5e7eb" stroke-width="3"/>
                    <circle id="timer-ring" cx="30" cy="30" r="20" fill="none" stroke="var(--primary)" stroke-width="3" stroke-dasharray="125.66" stroke-dashoffset="0" transform="rotate(-90 30 30)"/>
                </svg>
                <span id="quiz-timer">00:00</span>
            </div>
        </div>
        
        <div id="quiz-container">
            <div id="quiz-subject-name"></div>
            <div id="quiz-question-counter"></div>
            <div id="question-badge"></div>
            <h2 id="quiz-question-text">Savol yuklanmoqda...</h2>
            <div id="quiz-options" class="options-grid"></div>
            <div class="quiz-progress">
                <div id="quiz-progress-bar"></div>
                <span id="quiz-progress-text"></span>
            </div>
            <button id="btn-next" class="next-btn">Keyingi savol</button>
        </div>
    </div>

    <!-- MUHIM: To'g'ri script tartibi -->
    <!-- 1. AVVAL ma'lumotlar bazasi -->
    <script src="data/questions.js"></script>
    
    <!-- 2. KEYIN quiz engine -->
    <script src="js/quiz.js"></script>
    
    <!-- 3. Agar kerak bo'lsa, app.js (ixtiyoriy) -->
    <script src="js/app.js"></script>
</body>
</html>
